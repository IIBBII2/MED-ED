const ALS={
  hook:'ALS simultaneously destroys two completely separate levels of your motor system. Understanding <strong>why that dual hit is so devastating</strong> — and why motor neurons specifically — makes everything else click into place.',
  pills:[
    {t:'Motor neuron disease',c:'p-b'},{t:'UMN + LMN simultaneously',c:'p-a'},
    {t:'90% sporadic · 10% familial',c:'p-b'},{t:'Median survival 3–5 years',c:'p-r'},
    {t:'Riluzole · Edaravone · Tofersen',c:'p-g'}
  ],
  tabs:['Summary','Pathophysiology','Diagnosis','Treatment','Prevention','Quiz','Clinical case'],

  summary:`
  <div class="must-know">
    <div class="must-title">Must know before anything else</div>
    <div class="must-item">ALS = simultaneous loss of UMN (motor cortex) + LMN (spinal cord anterior horn) — this dual involvement is pathognomonic</div>
    <div class="must-item">Finding hyperreflexia in a wasted, fasciculating muscle in the same region = ALS until proven otherwise</div>
    <div class="must-item">TDP-43 cytoplasmic aggregates found in 97% of all ALS — the unifying molecular hallmark</div>
    <div class="must-item">Diagnosis of exclusion — no single confirmatory test; EMG is the most important investigation</div>
    <div class="must-item">Three approved drugs: Riluzole (glutamate ↓), Edaravone (free radicals ↓), Tofersen (SOD1 mRNA ↓, SOD1-ALS only)</div>
    <div class="must-item">Respiratory failure is the leading cause of death — FVC &lt;50% = start NIV (BiPAP)</div>
  </div>

  <div class="summary-section">
    <div class="sum-title"><div class="sum-icon si-b">🔬</div>Pathophysiology — core points</div>
    <div class="sum-items">
      <div class="sum-item"><div class="sum-bullet sb-b"></div><div class="sum-text"><strong>Two-neuron relay collapses:</strong> UMN (motor cortex → corticospinal tract) hands off to LMN (anterior horn → muscle). ALS kills both simultaneously.</div></div>
      <div class="sum-item"><div class="sum-bullet sb-b"></div><div class="sum-text"><strong>TDP-43 is the central player:</strong> normally in the nucleus managing RNA; in ALS it escapes to the cytoplasm, clumps up, and stops working. Found in 97% of all cases.</div></div>
      <div class="sum-item"><div class="sum-bullet sb-b"></div><div class="sum-text"><strong>Excitotoxicity:</strong> glutamate floods the synapse (astrocytes lose EAAT2 transporters) → AMPA/NMDA receptors overstimulated → massive Ca²⁺ floods into motor neurons which have almost zero calcium-buffering proteins to handle it.</div></div>
      <div class="sum-item"><div class="sum-bullet sb-b"></div><div class="sum-text"><strong>Why motor neurons specifically:</strong> enormous size (axons &gt;1m), no Ca²⁺ buffers, Ca²⁺-permeable AMPA receptors (low GluR2), and transport blockage by neurofilament pileup.</div></div>
      <div class="sum-item"><div class="sum-bullet sb-b"></div><div class="sum-text"><strong>Top familial genes:</strong> C9orf72 (~40%), SOD1 (~20%), FUS and TDP-43 (~5% each).</div></div>
    </div>
  </div>

  <div class="summary-section">
    <div class="sum-title"><div class="sum-icon si-r">🩺</div>Diagnosis — core points</div>
    <div class="sum-items">
      <div class="sum-item"><div class="sum-bullet sb-r"></div><div class="sum-text"><strong>UMN signs:</strong> Spasticity <span class="def">(muscles feel stiff and resist movement, like a clasp-knife snapping shut)</span>, hyperreflexia <span class="def">(tap the tendon → exaggerated jerk response)</span>, <strong>Babinski positive</strong> <span class="def">(stroke the sole → big toe extends upward — normally it curls down)</span>, clonus <span class="def">(rapid rhythmic jerking when you hold the foot in dorsiflexion)</span>.</div></div>
      <div class="sum-item"><div class="sum-bullet sb-r"></div><div class="sum-text"><strong>LMN signs:</strong> Muscle wasting <span class="def">(visible shrinkage of muscle bulk from denervation)</span>, fasciculations <span class="def">(small spontaneous twitches under the skin — dying neurons firing randomly)</span>, flaccidity <span class="def">(floppy, reduced tone)</span>, hyporeflexia.</div></div>
      <div class="sum-item"><div class="sum-bullet sb-r"></div><div class="sum-text"><strong>Onset patterns:</strong> Limb 60% (hand/foot, better prognosis), Bulbar 25% (slurred speech + swallowing, worse prognosis), Respiratory 5% (breathless lying flat, morning headache).</div></div>
      <div class="sum-item"><div class="sum-bullet sb-r"></div><div class="sum-text"><strong>El Escorial:</strong> Definite = UMN + LMN in 3+ regions (Bulbar, Cervical, Thoracic, Lumbosacral). EMG is the key investigation.</div></div>
      <div class="sum-item"><div class="sum-bullet sb-r"></div><div class="sum-text"><strong>Must exclude treatable mimics:</strong> MMN (GM1 Ab+, responds to IVIG), cervical myelopathy (MRI), Kennedy disease (CAG repeat in androgen receptor).</div></div>
    </div>
  </div>

  <div class="summary-section">
    <div class="sum-title"><div class="sum-icon si-g">💊</div>Treatment — core points</div>
    <div class="sum-items">
      <div class="sum-item"><div class="sum-bullet sb-g"></div><div class="sum-text"><strong>Riluzole</strong> (50mg twice daily) — blocks glutamate release → reduces excitotoxicity. Extends survival ~3 months. Monitor LFTs monthly ×3 then 3-monthly.</div></div>
      <div class="sum-item"><div class="sum-bullet sb-g"></div><div class="sum-text"><strong>Edaravone</strong> (IV, selected early patients) — free radical scavenger. Slows functional decline ~33%. FVC must be &gt;80%.</div></div>
      <div class="sum-item"><div class="sum-bullet sb-g"></div><div class="sum-text"><strong>Tofersen</strong> (intrathecal, SOD1-ALS only) — antisense oligonucleotide reducing toxic SOD1 protein. FDA approved 2023. First precision medicine in ALS.</div></div>
      <div class="sum-item"><div class="sum-bullet sb-g"></div><div class="sum-text"><strong>NIV (BiPAP):</strong> Start at FVC &lt;50% or when symptomatic. Extends survival 7–13 months. Morning headache = nocturnal CO₂ retention = act now.</div></div>
      <div class="sum-item"><div class="sum-bullet sb-g"></div><div class="sum-text"><strong>Symptomatic (SCREAM):</strong> Sialorrhoea (amitriptyline), Communication (voice bank early), Respiratory (NIV), Eating/dysphagia (PEG), Affect/pseudobulbar (dextromethorphan/quinidine), Muscle cramps/spasticity (mexiletine, baclofen).</div></div>
    </div>
  </div>

  <div class="summary-section">
    <div class="sum-title"><div class="sum-icon si-a">🛡️</div>Prevention — core points</div>
    <div class="sum-items">
      <div class="sum-item"><div class="sum-bullet sb-a"></div><div class="sum-text"><strong>Primary prevention:</strong> No proven intervention. Sporadic ALS has no reliable preventable cause. Avoid smoking, heavy metal exposure (weak evidence).</div></div>
      <div class="sum-item"><div class="sum-bullet sb-a"></div><div class="sum-text"><strong>Secondary:</strong> Genetic counselling + pre-symptomatic testing for relatives with known familial mutation. ATLAS trial: giving tofersen to pre-symptomatic SOD1 carriers to delay onset.</div></div>
      <div class="sum-item"><div class="sum-bullet sb-a"></div><div class="sum-text"><strong>Tertiary:</strong> Early NIV prevents respiratory crisis. PEG tube before FVC drops &lt;50%. Flu + pneumococcal vaccines. Physiotherapy prevents contractures. MDT care extends survival independently of drugs.</div></div>
    </div>
  </div>`,

  patho:`
  <div class="slbl">Click a section to explore</div>

  <div class="acc" id="pa0">
    <div class="atrig" onclick="tog('pa0')"><div class="atrig-l"><div class="aico ic-b">1</div><div><div class="a-title">The paradox at the heart of ALS</div><div class="a-sub">Why UMN + LMN signs together is almost unique to this disease</div></div></div><div class="a-arr">▼</div></div>
    <div class="abody">
      <p class="txt">ALS kills two completely separate populations of neurons <strong>at the same time</strong>. The <strong>upper motor neuron (UMN)</strong> starts in the motor cortex — specifically the giant Betz cells in layer V — and runs down the corticospinal tract. It doesn't touch muscle directly. It hands off to the <strong>lower motor neuron (LMN)</strong> in the spinal cord anterior horn, which then runs its axon all the way out to the muscle fibre itself.</p>
      <div class="co co-a"><div class="coi">💡</div><div class="ctx"><strong>Think of it as a two-neuron relay.</strong> The UMN is the general giving orders from headquarters. The LMN is the soldier on the ground. Most neurological diseases hit one or the other. ALS eliminates both simultaneously — which is why the clinical picture looks paradoxical.</div></div>
      <div class="cmp">
        <div class="cmp-col"><div class="cmp-h ch-r">UMN dying → loss of inhibition</div>
          <div class="cmp-row">Spasticity <span class="def">(muscles stiffen, resist passive movement like a clasp-knife)</span></div>
          <div class="cmp-row">Hyperreflexia <span class="def">(tendon tap → exaggerated jerk)</span></div>
          <div class="cmp-row">Babinski + <span class="def">(stroke sole → big toe extends UP instead of curling)</span></div>
          <div class="cmp-row">Clonus <span class="def">(rapid rhythmic jerks when holding foot bent upward)</span></div>
          <div class="cmp-row">Hoffman sign <span class="def">(flick middle fingernail → thumb and index finger flex involuntarily)</span></div>
        </div>
        <div class="cmp-col"><div class="cmp-h ch-b">LMN dying → loss of drive to muscle</div>
          <div class="cmp-row">Wasting <span class="def">(muscle visibly shrinks from lack of nerve input)</span></div>
          <div class="cmp-row">Fasciculations <span class="def">(tiny visible twitches under skin — dying neurons firing randomly)</span></div>
          <div class="cmp-row">Hyporeflexia <span class="def">(tap tendon → barely any response)</span></div>
          <div class="cmp-row">Flaccidity <span class="def">(muscle feels floppy, no resistance)</span></div>
          <div class="cmp-row">Cramps <span class="def">(painful sustained muscle contractions)</span></div>
        </div>
      </div>
      <div class="co co-b"><div class="coi">🔑</div><div class="ctx"><strong>The pearl:</strong> finding hyperreflexia (UMN) in a wasted, fasciculating muscle (LMN) in the <em>same region</em> = ALS until proven otherwise. This paradoxical combination is almost unique to ALS.</div></div>
    </div>
  </div>

  <div class="acc" id="pa1">
    <div class="atrig" onclick="tog('pa1')"><div class="atrig-l"><div class="aico ic-g">2</div><div><div class="a-title">Genetics — familial ALS and why it matters for everyone</div><div class="a-sub">C9orf72, SOD1, TDP-43 and the unifying hallmark</div></div></div><div class="a-arr">▼</div></div>
    <div class="abody">
      <p class="txt">10% of ALS is familial, 90% sporadic — but studying the familial genes revealed the exact pathways that also go wrong in sporadic ALS. Finding a mutation matters for family counselling and precision treatments.</p>
      <div class="gbr"><div class="gn">C9orf72</div><div class="gtrack"><div class="gfill" style="width:100%"></div></div><div class="gpct">~40%</div></div>
      <div class="gnote">A GGGGCC repeat that normally appears 2–8 times expands to hundreds of repeats. Also causes frontotemporal dementia — ALS and FTD are one spectrum.</div>
      <div class="gbr"><div class="gn">SOD1</div><div class="gtrack"><div class="gfill" style="width:50%"></div></div><div class="gpct">~20%</div></div>
      <div class="gnote">Mutant SOD1 doesn't just fail at clearing free radicals — it gains new toxic functions. Target of tofersen (2023), the first precision ALS medicine.</div>
      <div class="gbr"><div class="gn">FUS</div><div class="gtrack"><div class="gfill" style="width:14%"></div></div><div class="gpct">~5%</div></div>
      <div class="gnote">RNA-binding protein that escapes the nucleus and clumps in the cytoplasm. Often young-onset and aggressive.</div>
      <div class="gbr"><div class="gn">TDP-43</div><div class="gtrack"><div class="gfill" style="width:14%"></div></div><div class="gpct">~5%</div></div>
      <div class="gnote">Only 5% of familial cases, but TDP-43 aggregates are found in 97% of ALL ALS. The unifying hallmark of the disease.</div>
      <div class="co co-b"><div class="coi">🔑</div><div class="ctx"><strong>Why TDP-43 matters so much:</strong> regardless of what starts ALS — genetics, environment, ageing — the cascade converges on TDP-43 misbehaving. That's why it's the central drug development target.</div></div>
    </div>
  </div>

  <div class="acc" id="pa2">
    <div class="atrig" onclick="tog('pa2')"><div class="atrig-l"><div class="aico ic-a">3</div><div><div class="a-title">How the neuron actually dies — the full cascade</div><div class="a-sub">From one misfolded protein to a silent muscle — 6 steps</div></div></div><div class="a-arr">▼</div></div>
    <div class="abody">
      <p class="txt">This is why ALS is so hard to treat — there's no single cause. It's a self-amplifying cascade where each step makes the next worse. By the time symptoms appear, multiple mechanisms are already running simultaneously.</p>
      <div class="steps">
        <div class="step"><div class="sn">1</div><div><div class="stitle">Protein misfolding — the starting gun</div><div class="sdesc">TDP-43 (normally in the nucleus managing RNA splicing) gets cleaved, migrates to the cytoplasm, and forms sticky insoluble aggregates. These aggregates are toxic — and they simultaneously rob the nucleus of a critical worker.</div></div></div>
        <div class="sarr">↓</div>
        <div class="step"><div class="sn">2</div><div><div class="stitle">RNA processing collapses</div><div class="sdesc">Without TDP-43, hundreds of neuronal genes get mis-spliced. Motor neurons are especially sensitive because they have axons over 1 metre long — demanding constant perfectly-regulated protein synthesis just to stay alive.</div></div></div>
        <div class="sarr">↓</div>
        <div class="step"><div class="sn">3</div><div><div class="stitle">Excitotoxicity — glutamate floods the synapse</div><div class="sdesc">Astrocytes lose EAAT2 glutamate transporters, so glutamate accumulates. Motor neurons get chronically over-stimulated via AMPA and NMDA receptors → massive Ca²⁺ influx. Motor neurons have almost zero Ca²⁺ buffering proteins — they're completely unprotected. <strong>This is where riluzole acts.</strong></div></div></div>
        <div class="sarr">↓</div>
        <div class="step"><div class="sn">4</div><div><div class="stitle">Mitochondrial failure + oxidative storm</div><div class="sdesc">Ca²⁺ overload overwhelms mitochondria → electron transport chain leaks reactive oxygen species (ROS) — essentially sparks flying inside the cell. Mutant SOD1, which should neutralise these sparks, is broken and actively makes things worse. <strong>This is where edaravone acts.</strong></div></div></div>
        <div class="sarr">↓</div>
        <div class="step"><div class="sn">5</div><div><div class="stitle">Neuroinflammation amplifies everything</div><div class="sdesc">Microglia <span style="font-size:11px;color:var(--text3)">(the brain's immune cells)</span> flip from neuroprotective (M2) to pro-inflammatory (M1) — releasing TNF-α, IL-1β, and more glutamate. Reactive astrocytes join. A local problem becomes a self-amplifying loop.</div></div></div>
        <div class="sarr">↓</div>
        <div class="step"><div class="sn">6</div><div><div class="stitle">Axon retraction → silent muscle</div><div class="sdesc">Motor axons retract from the NMJ <span style="font-size:11px;color:var(--text3)">(neuromuscular junction — the connection point between nerve and muscle)</span> before the cell body dies ("dying-back"). Surviving neurons compensate by sprouting new connections, masking weakness early on. <strong>Fasciculations</strong> are dying neurons firing chaotically before going permanently silent.</div></div></div>
      </div>
      <div class="co co-a"><div class="coi">💡</div><div class="ctx"><strong>Why single drugs barely work:</strong> excitotoxicity worsens mitochondria, mitochondria worsen oxidative stress, oxidative stress inflames microglia, inflamed microglia release more glutamate. Blocking one pathway (riluzole) barely slows the others — which is why the survival benefit is only ~3 months.</div></div>
    </div>
  </div>

  <div class="acc" id="pa3">
    <div class="atrig" onclick="tog('pa3')"><div class="atrig-l"><div class="aico ic-r">4</div><div><div class="a-title">Why motor neurons specifically?</div><div class="a-sub">Four biological quirks that make these cells uniquely fragile</div></div></div><div class="a-arr">▼</div></div>
    <div class="abody">
      <div class="two-col">
        <div class="mini"><div class="mini-lbl">Reason 1</div><div class="mini-val">Extreme size</div><div class="mini-sub">Axons >1 metre. Maintaining ion gradients across this distance demands extraordinary energy — any mitochondrial failure is catastrophic.</div></div>
        <div class="mini"><div class="mini-lbl">Reason 2</div><div class="mini-val">No Ca²⁺ buffering</div><div class="mini-sub">Almost no calbindin-D28k or parvalbumin (proteins that mop up excess calcium). Purkinje cells express both and are relatively spared in ALS.</div></div>
        <div class="mini"><div class="mini-lbl">Reason 3</div><div class="mini-val">Ca²⁺-permeable AMPA</div><div class="mini-sub">Low GluR2 subunit content = calcium enters with every glutamate signal. Most neurons block this. Motor neurons don't.</div></div>
        <div class="mini"><div class="mini-lbl">Reason 4</div><div class="mini-val">Axonal transport blockage</div><div class="mini-sub">Neurofilaments pile up in the cell body, physically blocking survival signals from reaching the neuron from its muscle target.</div></div>
      </div>
      <div class="co co-a"><div class="coi">💡</div><div class="ctx"><strong>Think of motor neurons as a skyscraper with no fire sprinklers, no backup generator, and no emergency exits.</strong> Other neurons have at least some of these protective systems. Motor neurons have almost none.</div></div>
    </div>
  </div>`,

  diag:`
  <div class="slbl">Click a section to explore</div>

  <div class="acc" id="da0">
    <div class="atrig" onclick="tog('da0')"><div class="atrig-l"><div class="aico ic-b">1</div><div><div class="a-title">How ALS presents — the three onset patterns</div><div class="a-sub">Limb, bulbar, or respiratory — and why it changes prognosis</div></div></div><div class="a-arr">▼</div></div>
    <div class="abody">
      <p class="txt">ALS almost always starts asymmetrically — one hand, one foot, one side of the face. The progression is relentless and spreading: symptoms never improve, they only accumulate.</p>
      <div class="cmp">
        <div class="cmp-col"><div class="cmp-h ch-b">Limb onset (~60%)</div>
          <div class="cmp-row">Asymmetric hand or foot weakness</div>
          <div class="cmp-row"><strong>Split hand sign</strong> <span class="def">(thenar + 1st DI wasted but hypothenar spared — like the thumb side of the hand shrinks but pinky side stays)</span></div>
          <div class="cmp-row">Dropping things, stumbling, tripping</div>
          <div class="cmp-row">Relatively better prognosis</div>
        </div>
        <div class="cmp-col"><div class="cmp-h ch-a">Bulbar onset (~25%)</div>
          <div class="cmp-row">Dysarthria <span class="def">(slurred, effortful speech like talking through gravel)</span> — first sign</div>
          <div class="cmp-row">Dysphagia <span class="def">(difficulty swallowing — choking on liquids first)</span></div>
          <div class="cmp-row">More common in older women</div>
          <div class="cmp-row">Faster respiratory involvement → worse prognosis</div>
        </div>
      </div>
      <div class="mnem">
        <div class="mnem-lbl">Mnemonic — onset patterns</div>
        <div class="mnem-word">L · B · R</div>
        <div class="mnem-rows">
          <div class="mnem-row"><div class="mnem-L">L</div><div class="mnem-m">Limb — 60%, hands and feet, best prognosis</div></div>
          <div class="mnem-row"><div class="mnem-L">B</div><div class="mnem-m">Bulbar — 25%, speech + swallow, worse prognosis</div></div>
          <div class="mnem-row"><div class="mnem-L">R</div><div class="mnem-m">Respiratory — 5%, orthopnoea + morning headache</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="acc" id="da1">
    <div class="atrig" onclick="tog('da1')"><div class="atrig-l"><div class="aico ic-r">2</div><div><div class="a-title">What to find on examination</div><div class="a-sub">Signs that make the diagnosis — and what tells you it's NOT ALS</div></div></div><div class="a-arr">▼</div></div>
    <div class="abody">
      <div class="cmp">
        <div class="cmp-col"><div class="cmp-h ch-r">UMN signs — find these</div>
          <div class="cmp-row">Spasticity <span class="def">(clasp-knife: resists then suddenly gives)</span></div>
          <div class="cmp-row">Hyperreflexia <span class="def">(brisk, exaggerated tendon jerk)</span></div>
          <div class="cmp-row"><strong>Babinski +</strong> <span class="def">(big toe extends UP when you stroke the sole with a key — should curl down)</span></div>
          <div class="cmp-row">Clonus <span class="def">(hold foot bent up → rhythmic uncontrolled shaking starts)</span></div>
          <div class="cmp-row"><strong>Hoffman sign</strong> <span class="def">(flick the middle fingernail → index + thumb flex involuntarily)</span></div>
          <div class="cmp-row">Jaw jerk brisk <span class="def">(tap chin → brisk jaw snap = UMN above pons)</span></div>
        </div>
        <div class="cmp-col"><div class="cmp-h ch-b">LMN signs — find these</div>
          <div class="cmp-row">Wasting <span class="def">(visibly hollowed muscles, especially thenar eminence — the thumb pad)</span></div>
          <div class="cmp-row">Fasciculations <span class="def">(tiny spontaneous twitches visible under skin — dying neurons firing)</span></div>
          <div class="cmp-row">Flaccidity <span class="def">(muscle feels floppy like wet noodle)</span></div>
          <div class="cmp-row">Hyporeflexia <span class="def">(weak or absent tendon jerk)</span></div>
          <div class="cmp-row"><strong>Tongue fasciculations</strong> <span class="def">(ask patient to rest tongue — it ripples and twitches — highly specific for bulbar LMN involvement)</span></div>
        </div>
      </div>
      <div class="co co-g"><div class="coi">✓</div><div class="ctx"><strong>What is typically PRESERVED — if these are absent early, consider ALS.</strong> If they're prominent early, reconsider diagnosis: eye movements, bladder/bowel control, sensation, cognition (85% of patients).</div></div>
      <div class="mnem">
        <div class="mnem-lbl">Mnemonic — UMN signs "SHBACH"</div>
        <div class="mnem-word">SHBACH</div>
        <div class="mnem-rows">
          <div class="mnem-row"><div class="mnem-L">S</div><div class="mnem-m">Spasticity</div></div>
          <div class="mnem-row"><div class="mnem-L">H</div><div class="mnem-m">Hyperreflexia</div></div>
          <div class="mnem-row"><div class="mnem-L">B</div><div class="mnem-m">Babinski positive (big toe goes UP)</div></div>
          <div class="mnem-row"><div class="mnem-L">A</div><div class="mnem-m">Absent superficial reflexes</div></div>
          <div class="mnem-row"><div class="mnem-L">C</div><div class="mnem-m">Clonus</div></div>
          <div class="mnem-row"><div class="mnem-L">H</div><div class="mnem-m">Hoffman sign (fingernail flick → thumb flexes)</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="acc" id="da2">
    <div class="atrig" onclick="tog('da2')"><div class="atrig-l"><div class="aico ic-a">3</div><div><div class="a-title">El Escorial criteria — 4 regions, 3 levels of certainty</div><div class="a-sub">How many body regions are involved determines how certain the diagnosis is</div></div></div><div class="a-arr">▼</div></div>
    <div class="abody">
      <p class="txt">The body is divided into 4 regions. In each you look for both UMN and LMN signs. More regions = more certain diagnosis.</p>
      <div class="mnem">
        <div class="mnem-lbl">Mnemonic — the 4 regions "Big Cats Take Leaps"</div>
        <div class="mnem-word">BCTL</div>
        <div class="mnem-rows">
          <div class="mnem-row"><div class="mnem-L">B</div><div class="mnem-m">Bulbar — tongue, face, speech, swallowing</div></div>
          <div class="mnem-row"><div class="mnem-L">C</div><div class="mnem-m">Cervical — arms, neck, diaphragm</div></div>
          <div class="mnem-row"><div class="mnem-L">T</div><div class="mnem-m">Thoracic — back, abdomen</div></div>
          <div class="mnem-row"><div class="mnem-L">L</div><div class="mnem-m">Lumbosacral — legs, bladder (late)</div></div>
        </div>
      </div>
      <div class="cmp">
        <div class="cmp-col"><div class="cmp-h ch-r">Definite ALS</div><div class="cmp-row">UMN + LMN signs in 3+ regions</div><div class="cmp-row">OR bulbar + 2 spinal regions</div></div>
        <div class="cmp-col"><div class="cmp-h ch-a">Probable ALS</div><div class="cmp-row">UMN + LMN signs in 2 regions</div><div class="cmp-row">UMN signs must be rostral to LMN</div></div>
      </div>
      <div class="co co-b"><div class="coi">🔑</div><div class="ctx"><strong>Awaji criteria (2008)</strong> allow EMG findings to count as LMN signs — making diagnosis earlier and more sensitive. Now preferred in specialist centres.</div></div>
    </div>
  </div>

  <div class="acc" id="da3">
    <div class="atrig" onclick="tog('da3')"><div class="atrig-l"><div class="aico ic-g">4</div><div><div class="a-title">Key investigations</div><div class="a-sub">EMG is central — everything else mainly excludes mimics</div></div></div><div class="a-arr">▼</div></div>
    <div class="abody">
      <div class="steps">
        <div class="step"><div class="sn">1</div><div><div class="stitle">EMG / nerve conduction — the most important test</div><div class="sdesc">Shows fibrillations <span style="font-size:11px;color:var(--text3)">(spontaneous firing of single muscle fibres — sign of denervation)</span>, fasciculation potentials, and positive sharp waves across multiple myotomes and regions. Normal nerve conduction velocities exclude peripheral neuropathy. EMG detects subclinical denervation before the patient notices weakness.</div></div></div>
        <div class="step"><div class="sn">2</div><div><div class="stitle">MRI brain + spinal cord</div><div class="sdesc">Usually normal. May show T2 hyperintensity <span style="font-size:11px;color:var(--text3)">(white signal on MRI = damaged tissue)</span> along the corticospinal tract. Main purpose: exclude structural mimics — cervical myelopathy, tumour, syrinx <span style="font-size:11px;color:var(--text3)">(fluid-filled cavity in spinal cord)</span>.</div></div></div>
        <div class="step"><div class="sn">3</div><div><div class="stitle">Bloods — mainly to exclude treatable conditions</div><div class="sdesc">CK mildly elevated (denervation). Must exclude: thyroid disease, B12 deficiency, heavy metals, <strong>GM1 ganglioside antibodies</strong> <span style="font-size:11px;color:var(--text3)">(if positive = MMN, a treatable disease that looks like ALS)</span>, paraneoplastic antibodies.</div></div></div>
        <div class="step"><div class="sn">4</div><div><div class="stitle">Spirometry + overnight oximetry</div><div class="sdesc">FVC <span style="font-size:11px;color:var(--text3)">(Forced Vital Capacity — how much air you can breathe out forcefully)</span>, MIP/MEP <span style="font-size:11px;color:var(--text3)">(measures how strong your breathing muscles are)</span>. FVC &lt;50% = strong indication for NIV. Monitors disease progression.</div></div></div>
        <div class="step"><div class="sn">5</div><div><div class="stitle">Genetic testing</div><div class="sdesc">C9orf72 first (most common), then SOD1, FUS, TARDBP. Now offered to all patients — knowing the gene opens precision treatment options (tofersen for SOD1) and allows family counselling.</div></div></div>
      </div>
      <div class="mnem">
        <div class="mnem-lbl">Mnemonic — treatable mimics not to miss "MM CK"</div>
        <div class="mnem-word">MM CK</div>
        <div class="mnem-rows">
          <div class="mnem-row"><div class="mnem-L">M</div><div class="mnem-m">MMN — GM1 Ab+, LMN only, responds to IVIG. Always exclude this first.</div></div>
          <div class="mnem-row"><div class="mnem-L">M</div><div class="mnem-m">Myasthenia gravis — fatigable weakness, AChR Ab+, no wasting, no UMN</div></div>
          <div class="mnem-row"><div class="mnem-L">C</div><div class="mnem-m">Cervical myelopathy — MRI excludes, incredibly common pitfall</div></div>
          <div class="mnem-row"><div class="mnem-L">K</div><div class="mnem-m">Kennedy disease (SBMA) — X-linked, LMN only, CAG repeat in androgen receptor gene</div></div>
        </div>
      </div>
    </div>
  </div>`,

  treat:`
  <div class="slbl">Click a section to explore</div>

  <div class="acc" id="ta0">
    <div class="atrig" onclick="tog('ta0')"><div class="atrig-l"><div class="aico ic-b">1</div><div><div class="a-title">The big picture — why treatment is so hard</div><div class="a-sub">No cure. But multidisciplinary care matters more than any drug.</div></div></div><div class="a-arr">▼</div></div>
    <div class="abody">
      <p class="txt">ALS has no cure. The goal is <strong>disease-modifying</strong> (slowing progression) and <strong>symptomatic</strong> (managing the consequences). The single most impactful intervention isn't a drug — it's a coordinated multidisciplinary team. Studies show MDT care independently extends survival.</p>
      <div class="co co-a"><div class="coi">💡</div><div class="ctx"><strong>Why drugs barely help:</strong> by the time symptoms appear, ~80% of motor neurons in the affected region may already be dead. You're trying to protect the survivors — while a multi-mechanism cascade keeps running. This is why combining approaches (riluzole + edaravone) makes more biological sense than monotherapy.</div></div>
    </div>
  </div>

  <div class="acc" id="ta1">
    <div class="atrig" onclick="tog('ta1')"><div class="atrig-l"><div class="aico ic-g">2</div><div><div class="a-title">Disease-modifying drugs — RET</div><div class="a-sub">Riluzole, Edaravone, Tofersen — who gets what and why</div></div></div><div class="a-arr">▼</div></div>
    <div class="abody">
      <div class="drug">
        <div class="drug-h"><div class="drug-name">Riluzole</div><span class="dbadge db-1">First-line · Everyone</span></div>
        <div class="drug-b">
          <div class="drug-mech">Blocks presynaptic voltage-gated Na⁺ channels → reduces glutamate release from motor neurons → reduces excitotoxicity. The only drug proven in two RCTs to extend survival.</div>
          <div class="dstats">
            <div class="ds"><div class="ds-lbl">Survival benefit</div><div class="ds-val">~3 months median</div></div>
            <div class="ds"><div class="ds-lbl">Dose</div><div class="ds-val">50 mg twice daily</div></div>
            <div class="ds"><div class="ds-lbl">Side effects</div><div class="ds-val">Elevated LFTs, nausea</div></div>
            <div class="ds"><div class="ds-lbl">Monitor</div><div class="ds-val">LFTs monthly ×3, then 3-monthly</div></div>
          </div>
        </div>
      </div>
      <div class="drug">
        <div class="drug-h"><div class="drug-name">Edaravone (Radicava)</div><span class="dbadge db-2">Second-line · Selected patients</span></div>
        <div class="drug-b">
          <div class="drug-mech">Free radical scavenger — neutralises reactive oxygen species (ROS) and reduces oxidative stress. IV infusion in 28-day cycles. Best evidence in early, rapidly progressing ALS with FVC &gt;80%.</div>
          <div class="dstats">
            <div class="ds"><div class="ds-lbl">Benefit</div><div class="ds-val">Slows ALSFRS-R ~33%</div></div>
            <div class="ds"><div class="ds-lbl">Route</div><div class="ds-val">IV (oral in development)</div></div>
            <div class="ds"><div class="ds-lbl">Patient selection</div><div class="ds-val">Early ALS, FVC &gt;80%</div></div>
            <div class="ds"><div class="ds-lbl">Limitation</div><div class="ds-val">Cost, access varies by country</div></div>
          </div>
        </div>
      </div>
      <div class="drug">
        <div class="drug-h"><div class="drug-name">Tofersen (Qalsody)</div><span class="dbadge db-p">Precision · SOD1-ALS only</span></div>
        <div class="drug-b">
          <div class="drug-mech">Antisense oligonucleotide (ASO) <span style="font-size:11px;color:var(--text3)">(a strand of synthetic DNA that binds to mRNA to block it)</span> — binds SOD1 mRNA → prevents toxic SOD1 protein from being made. Intrathecal injection <span style="font-size:11px;color:var(--text3)">(injected into the spinal fluid)</span> every 4 weeks. FDA-approved 2023. First precision medicine in ALS.</div>
          <div class="dstats">
            <div class="ds"><div class="ds-lbl">Target</div><div class="ds-val">SOD1 mutation carriers only</div></div>
            <div class="ds"><div class="ds-lbl">Route</div><div class="ds-val">Intrathecal injection</div></div>
            <div class="ds"><div class="ds-lbl">Biomarker</div><div class="ds-val">↓ plasma neurofilament light</div></div>
            <div class="ds"><div class="ds-lbl">Significance</div><div class="ds-val">First targeted therapy in ALS</div></div>
          </div>
        </div>
      </div>
      <div class="mnem">
        <div class="mnem-lbl">Mnemonic — the 3 ALS drugs "RET"</div>
        <div class="mnem-word">RET</div>
        <div class="mnem-rows">
          <div class="mnem-row"><div class="mnem-L">R</div><div class="mnem-m">Riluzole — Reduces glutamate, first-line, everyone</div></div>
          <div class="mnem-row"><div class="mnem-L">E</div><div class="mnem-m">Edaravone — Eliminates free radicals, early selected cases</div></div>
          <div class="mnem-row"><div class="mnem-L">T</div><div class="mnem-m">Tofersen — Targets SOD1 mRNA, precision medicine only</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="acc" id="ta2">
    <div class="atrig" onclick="tog('ta2')"><div class="atrig-l"><div class="aico ic-r">3</div><div><div class="a-title">Respiratory management — the critical timeline</div><div class="a-sub">FVC thresholds that trigger each intervention</div></div></div><div class="a-arr">▼</div></div>
    <div class="abody">
      <p class="txt">Respiratory failure is the leading cause of death in ALS. Managing it well — and having the conversation early — is the most impactful clinical intervention. NIV (BiPAP) extends survival by 7–13 months.</p>
      <div class="tl">
        <div class="tl-item"><div class="tl-dot i"></div><div class="tl-lbl">FVC &gt;80%</div><div class="tl-title">Establish baseline, begin the conversation</div><div class="tl-desc">3-monthly spirometry. Educate about NIV. Start advance care planning while full capacity and time to think remain.</div></div>
        <div class="tl-item"><div class="tl-dot i"></div><div class="tl-lbl">FVC 50–80% or symptomatic</div><div class="tl-title">Consider starting NIV (BiPAP)</div><div class="tl-desc">Especially if: orthopnoea <span style="font-size:11px;color:var(--text3)">(breathless lying flat — needs 2+ pillows to sleep)</span>, morning headache <span style="font-size:11px;color:var(--text3)">(CO₂ builds up overnight → headache on waking)</span>, or poor sleep. Overnight oximetry helps.</div></div>
        <div class="tl-item"><div class="tl-dot w"></div><div class="tl-lbl">FVC &lt;50% or MIP &lt;60 cmH₂O</div><div class="tl-title">NIV strongly recommended — act now</div><div class="tl-desc">Compensatory hyperventilation may mask symptoms — don't wait for ABG deterioration. Add cough-assist (MI-E) <span style="font-size:11px;color:var(--text3)">(a machine that helps clear secretions from airways that the patient can no longer cough out)</span> if bulbar function preserved.</div></div>
        <div class="tl-item"><div class="tl-dot d"></div><div class="tl-lbl">Advanced disease</div><div class="tl-title">Tracheostomy ventilation vs palliative care</div><div class="tl-desc">Invasive ventilation can prolong life for years but doesn't stop bulbar or cognitive decline. Palliative opioids for dyspnoea <span style="font-size:11px;color:var(--text3)">(difficulty breathing)</span> are equally valid. This decision must be made with the patient while they can still express their wishes.</div></div>
      </div>
    </div>
  </div>

  <div class="acc" id="ta3">
    <div class="atrig" onclick="tog('ta3')"><div class="atrig-l"><div class="aico ic-a">4</div><div><div class="a-title">Symptomatic management — SCREAM</div><div class="a-sub">Six symptom domains, six interventions</div></div></div><div class="a-arr">▼</div></div>
    <div class="abody">
      <div class="sym-grid">
        <div class="sym-card"><div class="sym-title">Sialorrhoea <span style="font-size:10px;color:var(--text3);font-weight:400">(drooling — overproduction of saliva)</span></div><div class="sym-tx">Amitriptyline (anticholinergic, 1st-line), hyoscine patch, glycopyrrolate. Botulinum toxin to salivary glands if severe.</div></div>
        <div class="sym-card"><div class="sym-title">Communication</div><div class="sym-tx">Voice bank early <span style="font-size:10px;color:var(--text3)">(record your voice while speech is still clear)</span>. AAC devices, eye-tracking tech. Refer to SLT before speech deteriorates.</div></div>
        <div class="sym-card"><div class="sym-title">Respiratory</div><div class="sym-tx">NIV (BiPAP) at FVC &lt;50%. Cough-assist device. Regular spirometry. Flu + pneumococcal vaccines.</div></div>
        <div class="sym-card"><div class="sym-title">Eating / dysphagia <span style="font-size:10px;color:var(--text3);font-weight:400">(difficulty swallowing)</span></div><div class="sym-tx">SLT review, texture-modified diet. PEG tube <span style="font-size:10px;color:var(--text3)">(feeding tube directly into stomach)</span> when FVC &gt;50% (safer anaesthetic). Plan before FVC drops further.</div></div>
        <div class="sym-card"><div class="sym-title">Affect — pseudobulbar <span style="font-size:10px;color:var(--text3);font-weight:400">(involuntary laughing/crying)</span></div><div class="sym-tx">Dextromethorphan/quinidine (Nuedexta) — RCT evidence. Amitriptyline as alternative. This is a UMN sign, not depression.</div></div>
        <div class="sym-card"><div class="sym-title">Muscle cramps + spasticity</div><div class="sym-tx">Mexiletine (Na⁺ blocker, RCT evidence for cramps), baclofen (GABA-B agonist for spasticity). Physiotherapy and stretching.</div></div>
      </div>
      <div class="mnem">
        <div class="mnem-lbl">Mnemonic — symptomatic management "SCREAM"</div>
        <div class="mnem-word">SCREAM</div>
        <div class="mnem-rows">
          <div class="mnem-row"><div class="mnem-L">S</div><div class="mnem-m">Sialorrhoea → amitriptyline / botox</div></div>
          <div class="mnem-row"><div class="mnem-L">C</div><div class="mnem-m">Communication → voice bank, AAC devices</div></div>
          <div class="mnem-row"><div class="mnem-L">R</div><div class="mnem-m">Respiratory → NIV BiPAP at FVC &lt;50%</div></div>
          <div class="mnem-row"><div class="mnem-L">E</div><div class="mnem-m">Eating/dysphagia → SLT, PEG tube</div></div>
          <div class="mnem-row"><div class="mnem-L">A</div><div class="mnem-m">Affect (pseudobulbar) → dextromethorphan/quinidine</div></div>
          <div class="mnem-row"><div class="mnem-L">M</div><div class="mnem-m">Muscle cramps/spasticity → mexiletine, baclofen</div></div>
        </div>
      </div>
    </div>
  </div>`,

  prev:`
  <div class="slbl">Click a section to explore</div>

  <div class="acc" id="pra0">
    <div class="atrig" onclick="tog('pra0')"><div class="atrig-l"><div class="aico ic-r">1</div><div><div class="a-title">Primary prevention — honest answer: barely possible</div><div class="a-sub">Why ALS is so hard to prevent, and what little we know</div></div></div><div class="a-arr">▼</div></div>
    <div class="abody">
      <p class="txt">No proven primary prevention for ALS exists. 90% of cases are sporadic with no identifiable cause. Unlike cardiovascular disease, there are no reliable lifestyle changes that dramatically reduce risk.</p>
      <div class="two-col">
        <div class="mini"><div class="mini-lbl">Weak evidence</div><div class="mini-val">Smoking</div><div class="mini-sub">Consistently associated in epidemiological studies. Plausible via oxidative stress. Modest relative risk increase — but not a clear causal link.</div></div>
        <div class="mini"><div class="mini-lbl">Paradox</div><div class="mini-val">Higher BMI = better prognosis</div><div class="mini-sub">Patients with higher BMI at diagnosis have better survival — likely reflects metabolic reserve, not protection. ALS causes hypermetabolism.</div></div>
      </div>
      <div class="co co-a"><div class="coi">💡</div><div class="ctx"><strong>Don't over-sell prevention here.</strong> Telling an ALS patient that lifestyle caused their disease is usually inaccurate and always unhelpful. The disease is overwhelmingly driven by biology we don't yet understand.</div></div>
    </div>
  </div>

  <div class="acc" id="pra1">
    <div class="atrig" onclick="tog('pra1')"><div class="atrig-l"><div class="aico ic-b">2</div><div><div class="a-title">Secondary prevention — genetic counselling and the ATLAS trial</div><div class="a-sub">Pre-symptomatic testing and intercepting ALS before it starts</div></div></div><div class="a-arr">▼</div></div>
    <div class="abody">
      <p class="txt">For the 10% with familial ALS, secondary prevention is becoming a real clinical possibility. This is one of the most exciting frontiers in neurology.</p>
      <div class="steps">
        <div class="step"><div class="sn">1</div><div><div class="stitle">Genetic counselling for families</div><div class="sdesc">Relatives of patients with identified pathogenic variants — especially C9orf72 and SOD1 — can be offered pre-symptomatic testing. This allows informed decisions about family planning and enrolment in prevention trials.</div></div></div>
        <div class="step"><div class="sn">2</div><div><div class="stitle">The ATLAS trial — the paradigm shift</div><div class="sdesc">Giving tofersen to SOD1 mutation carriers who don't yet have symptoms. If successful, it would be the first disease-prevention trial in a neurodegenerative condition ever. Pre-symptomatic NfL <span style="font-size:11px;color:var(--text3)">(neurofilament light chain — a protein released into blood when neurons are stressed)</span> rises before symptoms — being validated as a biomarker to identify who is about to convert.</div></div></div>
      </div>
    </div>
  </div>

  <div class="acc" id="pra2">
    <div class="atrig" onclick="tog('pra2')"><div class="atrig-l"><div class="aico ic-g">3</div><div><div class="a-title">Tertiary prevention — where clinical care has real impact</div><div class="a-sub">Stopping complications from compounding the decline</div></div></div><div class="a-arr">▼</div></div>
    <div class="abody">
      <div class="cmp">
        <div class="cmp-col"><div class="cmp-h ch-r">Complication to prevent</div><div class="cmp-row">Respiratory failure</div><div class="cmp-row">Malnutrition</div><div class="cmp-row">Aspiration pneumonia <span class="def">(food/liquid inhaled into lungs)</span></div><div class="cmp-row">Contractures <span class="def">(joints freeze in fixed position from disuse)</span></div><div class="cmp-row">Sudden respiratory crisis</div></div>
        <div class="cmp-col"><div class="cmp-h ch-g">How to prevent it</div><div class="cmp-row">Early NIV, 3-monthly FVC</div><div class="cmp-row">PEG tube, dietitian, high-calorie diet</div><div class="cmp-row">SLT, texture modification, flu + pneumococcal vaccines</div><div class="cmp-row">Physiotherapy, positioning, splints</div><div class="cmp-row">Advance care planning early, document wishes</div></div>
      </div>
    </div>
  </div>`,

  quiz_questions:[
    {q:"A 58-year-old man has wasting of his right thenar eminence and brisk reflexes in the same hand. What is the most likely diagnosis?",opts:["Cervical radiculopathy C8","Carpal tunnel syndrome","ALS","Multifocal motor neuropathy"],c:2,exp:"Wasting (LMN sign) + hyperreflexia (UMN sign) in the same region = ALS. The split hand pattern with thenar > hypothenar wasting is characteristic. Cervical radiculopathy and MMN give LMN signs only. CTS causes sensory symptoms and no wasting."},
    {q:"What is the molecular hallmark found in 97% of all ALS cases — both sporadic and familial?",opts:["SOD1 protein aggregates","TDP-43 cytoplasmic aggregates","C9orf72 repeat expansion","Alpha-synuclein Lewy bodies"],c:1,exp:"TDP-43 cytoplasmic aggregates are found in 97% of all ALS — making them the unifying pathological hallmark regardless of genetic cause. SOD1 aggregates are specific to SOD1-ALS. Alpha-synuclein is Parkinson's disease."},
    {q:"Which mechanism does riluzole target in ALS?",opts:["Free radical scavenging","Presynaptic glutamate release inhibition","SOD1 mRNA translation blockade","Microglial M1 activation"],c:1,exp:"Riluzole blocks voltage-gated Na⁺ channels on presynaptic motor neuron terminals → reduces glutamate release → reduces excitotoxicity. Edaravone is the free radical scavenger. Tofersen targets SOD1 mRNA. No approved drug directly targets microglial activation."},
    {q:"At what FVC threshold is NIV (BiPAP) strongly recommended in ALS?",opts:["FVC <80%","FVC <65%","FVC <50%","FVC <30%"],c:2,exp:"FVC <50% predicted (especially with symptoms like orthopnoea or morning headache) is the threshold for strong NIV recommendation. Earlier initiation (50–80%) can be considered if symptomatic. NIV at this stage extends survival by 7–13 months."},
    {q:"What combination of findings is required for 'Definite ALS' by the El Escorial criteria?",opts:["UMN signs in 2 body regions","LMN signs in 3 body regions","UMN + LMN signs in 3 or more regions","UMN + LMN signs in 2 regions, UMN signs rostral to LMN"],c:2,exp:"Definite ALS = UMN + LMN signs in 3 or more of the 4 body regions (Bulbar, Cervical, Thoracic, Lumbosacral). Two regions with UMN rostral to LMN = Probable ALS."},
    {q:"Which gene is targeted by tofersen, the first precision medicine approved for ALS?",opts:["C9orf72","TDP-43 (TARDBP)","SOD1","FUS"],c:2,exp:"Tofersen is an antisense oligonucleotide that binds SOD1 mRNA to reduce production of toxic SOD1 protein. FDA-approved 2023 specifically for SOD1-mutation ALS. C9orf72 and FUS are targets of other drugs in development."},
    {q:"A patient with ALS develops uncontrollable laughing and crying that is disproportionate to their emotional state. What is this, and what is the first-line treatment?",opts:["Depression — start SSRI","Pseudobulbar affect — dextromethorphan/quinidine","Anxiety — benzodiazepine","Bulbar ALS — increase riluzole dose"],c:1,exp:"Pseudobulbar affect = involuntary emotional expression from UMN loss of cortical inhibition over the brainstem's emotional response circuits. Dextromethorphan/quinidine (Nuedexta) has RCT evidence. Amitriptyline is an alternative. This is distinct from depression — the affect is disproportionate and involuntary, not a mood disorder."},
    {q:"Why are motor neurons uniquely vulnerable in ALS compared to most other neuron types?",opts:["They have excess calbindin and parvalbumin for calcium buffering","They have high GluR2 content making AMPA receptors calcium-impermeable","They have low calcium buffering capacity and enormous metabolic demands due to axon length","They lack NMDA receptors entirely"],c:2,exp:"Motor neurons are uniquely vulnerable due to: (1) enormous axon length >1m requiring huge metabolic demand, (2) almost no calbindin or parvalbumin for Ca²⁺ buffering, (3) low GluR2 → Ca²⁺-permeable AMPA receptors, (4) neurofilament transport blockage. High GluR2 would be PROTECTIVE — motor neurons have LOW GluR2."},
  ],

  case:{
    vignette:`<strong>Mr. Jan de Vries, 54, civil engineer from Rotterdam</strong>, comes to his GP after noticing his right hand has become progressively "clumsy" over 8 months. He initially blamed work stress but it keeps worsening — he can no longer button his shirt, dropped a coffee mug last week, and notices occasional twitching in his right forearm that wakes him at night.<br><br>His wife adds that his speech sounds slightly slurred when tired, and he has laughed inappropriately at things that aren't funny — which is very unlike him.<br><br><strong>Examination:</strong> Marked wasting of the right thenar eminence <span style="font-size:11px;color:var(--text3)">(thumb pad is visibly shrunken)</span> and first dorsal interosseous. Visible fasciculations in right forearm and right calf. Tone increased in both arms (clasp-knife). Reflexes brisk throughout — 3+ at biceps, triceps, both knees. Right plantar response extensor (Babinski positive). Tongue shows mild fasciculations on left side. Sensation completely normal. No family history of neurological disease.`,
    questions:[
      {q:"What is the most likely diagnosis, and what single examination finding is most important in confirming it?",opts:["Cervical myelopathy — cord compression on MRI is the key finding","ALS — finding UMN and LMN signs simultaneously in the same region (hyperreflexia + wasting + fasciculations together)","Multifocal motor neuropathy — absent reflexes with wasting is the key finding","Myasthenia gravis — fatigable ptosis and proximal weakness is the key finding"],c:1,exp:"This is ALS. The defining finding is UMN signs (hyperreflexia, Babinski+, spasticity) combined with LMN signs (wasting, fasciculations) in multiple regions simultaneously — this paradox is almost pathognomonic. The split hand pattern and tongue fasciculations add certainty. MMN gives LMN signs only. Cervical myelopathy wouldn't explain tongue fasciculations. MG doesn't cause wasting or fasciculations."},
      {q:"What is the single most important investigation to order first?",opts:["MRI brain — expect bilateral T2 changes in motor cortex","EMG / nerve conduction study — expect fibrillations, fasciculation potentials, positive sharp waves in multiple myotomes with normal nerve conduction velocities","Serum CK — expect markedly elevated CK >10,000 IU/L","GM1 ganglioside antibodies — expect strongly positive result"],c:1,exp:"EMG is the most important test. It will show active denervation (fibrillations, positive sharp waves) and chronic reinnervation across multiple myotomes — confirming LMN involvement beyond what's clinically visible. Normal nerve conduction velocities exclude peripheral neuropathy and MMN. MRI is important to exclude structural mimics but won't confirm ALS. CK is only mildly elevated in ALS. GM1 antibodies should be checked, but their value is in being NEGATIVE (to exclude MMN)."},
      {q:"Three months later, his wife calls worried — he's waking breathless at night and has morning headaches every day. What do you do next?",opts:["Increase riluzole dose — disease is progressing and needs stronger glutamate blockade","Arrange urgent spirometry (FVC, MIP, MEP) and overnight oximetry — morning headache = nocturnal CO₂ retention, may need NIV immediately","Order a CT pulmonary angiogram to exclude pulmonary embolism","Reassure — morning headaches and nocturnal breathlessness are expected in ALS and require no acute action"],c:1,exp:"Morning headache = nocturnal CO₂ retention until proven otherwise in ALS. This is a respiratory emergency. Arrange urgent spirometry and overnight oximetry immediately. If FVC <50% or oximetry shows desaturations/hypercapnia, initiate NIV (BiPAP) immediately — it extends survival 7–13 months and dramatically improves quality of life. Riluzole dose has no effect on respiratory function. PE is possible but the clinical context points strongly to hypoventilation."},
    ]
  }
};

// ═══════════════════════════════════════════════════════
//  STATE & NAVIGATION
// ═══════════════════════════════════════════════════════
let S={sys:null,grp:null,dis:null};
let totalCorrect=0,totalAnswered=0;

function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}
function updateBC(){
  const bc=document.getElementById('bc');
  let p=[`<span class="bcl" onclick="goHome()">All systems</span>`];
  if(S.sys)p.push(`<span class="bcs">›</span><span class="bcl" onclick="goToSys('${S.sys.id}')">${S.sys.name}</span>`);
  if(S.grp)p.push(`<span class="bcs">›</span><span class="bcl" onclick="goToGrp('${S.grp}')">${GROUPS[S.grp].name}</span>`);
  if(S.dis)p.push(`<span class="bcs">›</span><span>${DISEASE_META[S.dis]?.name||''}</span>`);
  bc.innerHTML=p.join('');
  document.getElementById('hdr-score').textContent=totalAnswered>0?`${totalCorrect}/${totalAnswered} correct`:'';
}

function goHome(){S={sys:null,grp:null,dis:null};showView('v-home');updateBC();}
function goToSys(id){S.sys=SYSTEMS.find(s=>s.id===id);S.grp=null;S.dis=null;renderGroups();showView('v-group');updateBC();}
function goToGrp(gid){S.grp=gid;S.dis=null;renderDiseases();showView('v-disease');updateBC();}

function renderHome(){
  document.getElementById('sys-cards').innerHTML=SYSTEMS.map(s=>
    `<div class="card" onclick="goToSys('${s.id}')">
      <div class="card-icon">${s.icon}</div>
      <div class="card-name">${s.name}</div>
      <div class="card-sub">${s.sub}</div>
      <div class="card-count">${s.groups.filter(g=>GROUPS[g]).length} groups</div>
    </div>`).join('');
}

function renderGroups(){
  document.getElementById('grp-lbl').textContent=S.sys.name+' — disease groups';
  document.getElementById('grp-cards').innerHTML=S.sys.groups.filter(g=>GROUPS[g]).map(gid=>{
    const g=GROUPS[gid];
    const hasReady=g.diseases.some(d=>DISEASE_META[d]?.ready);
    return `<div class="card" onclick="goToGrp('${gid}')">
      <div class="card-name">${g.name}${hasReady?` <span class="badge-soon" style="background:var(--success-bg);color:var(--success-text);border-color:var(--success-border)">✓ ALS ready</span>`:''}</div>
      <div class="card-sub">${g.sub}</div>
      <div class="card-count">${g.diseases.filter(d=>DISEASE_META[d]).length} diseases</div>
    </div>`;
  }).join('');
}

function renderDiseases(){
  const g=GROUPS[S.grp];
  document.getElementById('dis-lbl').textContent=g.name+' — select a disease';
  document.getElementById('dis-back').onclick=()=>goToSys(S.sys.id);
  document.getElementById('dis-cards').innerHTML=g.diseases.filter(d=>DISEASE_META[d]).map(did=>{
    const d=DISEASE_META[did];
    if(d.ready){
      return `<div class="card" onclick="openDisease('${did}')">
        <div class="card-name">${d.name}</div>
        <div class="card-sub">${d.tag}</div>
        <div class="card-count" style="color:var(--success-text)">✓ Full module ready</div>
      </div>`;
    }
    return `<div class="card locked" title="Coming soon">
      <div class="card-name">${d.name} <span class="badge-soon">Soon</span></div>
      <div class="card-sub">${d.tag}</div>
    </div>`;
  }).join('');
}

function openDisease(did){
  S.dis=did;
  const d=DISEASE_META[did];
  const data=ALS;
  document.getElementById('det-tag').textContent=GROUPS[S.grp].name;
  document.getElementById('det-title').textContent=d.full;
  document.getElementById('det-hook').innerHTML=data.hook;
  document.getElementById('det-pills').innerHTML=data.pills.map(p=>`<span class="pill ${p.c}">${p.t}</span>`).join('');
  // Tabs
  const tabBar=document.getElementById('det-tabs');
  tabBar.innerHTML=data.tabs.map((t,i)=>`<div class="tb${i===0?' on':''}" onclick="showDTab(${i},this)">${t}</div>`).join('');
  renderDTab(0);
  document.getElementById('det-back').onclick=()=>{S.dis=null;renderDiseases();showView('v-disease');updateBC();};
  showView('v-detail');
  updateBC();
}

let qIdx=0,qScore=0,cIdx=0,cScore=0;

function renderDTab(n){
  const data=ALS;
  const content=document.getElementById('det-content');
  if(n===0) content.innerHTML=data.summary;
  else if(n===1) content.innerHTML=data.patho;
  else if(n===2) content.innerHTML=data.diag;
  else if(n===3) content.innerHTML=data.treat;
  else if(n===4) content.innerHTML=data.prev;
  else if(n===5){content.innerHTML=`<div class="qwrap"><div id="qm"><div class="qprog" id="qprog"></div><div class="qq" id="qq"></div><div class="qopts" id="qopts"></div><div class="qfb" id="qfb"></div><button class="qnext" id="qnext" onclick="nextQ()">Next →</button></div><div class="qscore" id="qscore"><div class="qsnum" id="qsnum"></div><div class="qslbl" id="qslbl"></div><button class="qsbtn" onclick="startQ()">Try again</button></div></div>`;qIdx=0;qScore=0;startQ();}
  else if(n===6){content.innerHTML=`<div id="cw"></div>`;cIdx=0;cScore=0;renderCase();}
}
function showDTab(n,el){
  document.querySelectorAll('.tb').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderDTab(n);
}

// Quiz
function startQ(){document.getElementById('qm').style.display='block';document.getElementById('qscore').style.display='none';qIdx=0;qScore=0;renderQ();}
function renderQ(){
  const qs=ALS.quiz_questions;
  if(qIdx>=qs.length){
    document.getElementById('qm').style.display='none';
    document.getElementById('qscore').style.display='block';
    const pct=Math.round(qScore/qs.length*100);
    document.getElementById('qsnum').textContent=qScore+'/'+qs.length;
    document.getElementById('qslbl').textContent=pct>=80?'Excellent! You know your ALS.':pct>=60?'Good effort. Review the weak spots.':'Keep studying — go back through the tabs.';
    return;
  }
  const q=qs[qIdx];
  document.getElementById('qprog').textContent='Question '+(qIdx+1)+' of '+qs.length;
  document.getElementById('qq').textContent=q.q;
  document.getElementById('qopts').innerHTML=q.opts.map((o,i)=>`<button class="qopt" onclick="ansQ(${i})">${o}</button>`).join('');
  document.getElementById('qfb').style.display='none';
  document.getElementById('qnext').style.display='none';
}
function ansQ(chosen){
  const q=ALS.quiz_questions[qIdx];
  document.querySelectorAll('.qopt').forEach((o,i)=>{o.disabled=true;if(i===q.c)o.classList.add('correct');else if(i===chosen&&chosen!==q.c)o.classList.add('wrong');});
  if(chosen===q.c){qScore++;totalCorrect++;}
  totalAnswered++;
  document.getElementById('qfb').textContent=(chosen===q.c?'✓ Correct. ':'✗ Incorrect. ')+q.exp;
  document.getElementById('qfb').style.display='block';
  document.getElementById('qnext').style.display='inline-block';
  updateBC();
}
function nextQ(){qIdx++;renderQ();}

// Case
function renderCase(){
  const done=cIdx>=ALS.case.questions.length;
  const q=done?null:ALS.case.questions[cIdx];
  document.getElementById('cw').innerHTML=`
    <div class="case-vig"><div class="case-lbl">Clinical vignette · Mr. Jan de Vries, 54</div><div class="case-text">${ALS.case.vignette}</div></div>
    ${done?`<div class="cscore"><div class="csnum">${cScore}/${ALS.case.questions.length}</div><div class="cslbl">${Math.round(cScore/ALS.case.questions.length*100)}% — ${cScore===3?'Perfect clinical reasoning!':cScore===2?'Strong work! Review the question you missed.':'Review the respiratory management section.'}</div><button class="csbtn" onclick="resetCase()">New attempt →</button></div>`:`
    <div class="cqcard"><div class="cqlbl">Question ${cIdx+1} of ${ALS.case.questions.length}</div><div class="cqtxt">${q.q}</div>
    <div class="copts">${q.opts.map((o,i)=>`<button class="copt" onclick="ansCase(${i})">${o}</button>`).join('')}</div>
    <div class="cfb" id="cfb"></div><button class="cnext" id="cnext" onclick="nextCase()">Next question →</button></div>`}`;
}
function ansCase(chosen){
  const q=ALS.case.questions[cIdx];
  document.querySelectorAll('.copt').forEach((o,i)=>{o.disabled=true;if(i===q.c)o.classList.add('correct');else if(i===chosen&&chosen!==q.c)o.classList.add('wrong');});
  if(chosen===q.c){cScore++;totalCorrect++;}
  totalAnswered++;
  document.getElementById('cfb').innerHTML=(chosen===q.c?'<strong>✓ Correct.</strong> ':'<strong>✗ Incorrect.</strong> ')+q.exp;
  document.getElementById('cfb').style.display='block';
  document.getElementById('cnext').style.display='inline-block';
  updateBC();
}
function nextCase(){cIdx++;renderCase();}
function resetCase(){cIdx=0;cScore=0;renderCase();}

function tog(id){document.getElementById(id).classList.toggle('open');}

renderHome();
updateBC();
</script>
</body>
</html>
