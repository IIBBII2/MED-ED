<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MED-ED — Medical Knowledge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeecea;
  --text:#1a1a18;--text2:#6b6b66;--text3:#9b9b94;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --accent:#2563eb;--accent-bg:#eff6ff;--accent-text:#1d4ed8;
  --success-bg:#f0fdf4;--success-text:#166534;--success-border:#bbf7d0;
  --danger-bg:#fef2f2;--danger-text:#991b1b;--danger-border:#fecaca;
  --warn-bg:#fffbeb;--warn-text:#92400e;--warn-border:#fde68a;
  --info-bg:#eff6ff;--info-text:#1d4ed8;--info-border:#bfdbfe;
  --r:10px;--rl:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
    --text:#e8e8e2;--text2:#a0a09a;--text3:#6b6b66;
    --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.16);
    --accent:#3b82f6;--accent-bg:#1e3a5f;--accent-text:#93c5fd;
    --success-bg:#14261a;--success-text:#4ade80;--success-border:#166534;
    --danger-bg:#2d1515;--danger-text:#f87171;--danger-border:#991b1b;
    --warn-bg:#2a1f0a;--warn-text:#fbbf24;--warn-border:#92400e;
    --info-bg:#1e3a5f;--info-text:#93c5fd;--info-border:#1d4ed8;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;}
#app{max-width:800px;margin:0 auto;padding:20px 16px 60px;}

/* Header */
#hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:0.5px solid var(--border);}
.logo{font-size:18px;font-weight:700;letter-spacing:-.02em;cursor:pointer;}
.logo span{color:var(--accent);}
#hdr-score{font-size:11px;color:var(--text3);}

/* Breadcrumb */
#bc{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--text2);margin-bottom:18px;min-height:16px;}
.bcl{cursor:pointer;color:var(--accent);}
.bcl:hover{text-decoration:underline;}
.bcs{color:var(--text3);}

/* Section label */
.slbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}

/* Cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px;margin-bottom:20px;}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:13px;cursor:pointer;transition:border-color .15s,transform .1s;display:flex;flex-direction:column;gap:4px;}
.card:hover{border-color:var(--border2);transform:translateY(-1px);}
.card-icon{font-size:18px;line-height:1;margin-bottom:2px;}
.card-name{font-size:13px;font-weight:600;color:var(--text);}
.card-sub{font-size:11px;color:var(--text2);line-height:1.4;}
.card-count{font-size:10px;color:var(--text3);margin-top:2px;}
.card.locked{opacity:.5;cursor:default;}
.card.locked:hover{transform:none;border-color:var(--border);}

/* Back btn */
.back{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 11px;margin-bottom:16px;border:0.5px solid var(--border2);border-radius:var(--r);cursor:pointer;background:var(--bg);color:var(--text2);transition:background .15s;font-family:inherit;}
.back:hover{background:var(--bg2);color:var(--text);}

/* Coming soon badge */
.badge-soon{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;background:var(--bg3);color:var(--text3);border:0.5px solid var(--border);}

/* Views */
.view{display:none;}.view.on{display:block;}

/* ── DISEASE DETAIL ── */
.disease-hero{border-radius:0 var(--rl) var(--rl) 0;padding:20px 20px 16px;margin-bottom:18px;background:var(--bg2);border-left:3px solid var(--info-border);border-top:0.5px solid var(--border);border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);}
.dh-tag{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-text);margin-bottom:6px;}
.dh-title{font-size:21px;font-weight:600;color:var(--text);margin-bottom:8px;letter-spacing:-.02em;}
.dh-hook{font-size:13px;line-height:1.8;color:var(--text2);}
.dh-hook strong{font-weight:500;color:var(--text);}

.pill-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px;}
.pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;}
.p-b{background:var(--info-bg);color:var(--info-text);}
.p-r{background:var(--danger-bg);color:var(--danger-text);}
.p-g{background:var(--success-bg);color:var(--success-text);}
.p-a{background:var(--warn-bg);color:var(--warn-text);}

/* Tab bar */
.tab-bar{display:flex;gap:0;border-bottom:0.5px solid var(--border);margin-bottom:16px;overflow-x:auto;}
.tb{font-size:12px;font-weight:500;padding:8px 13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--text2);white-space:nowrap;transition:all .15s;user-select:none;}
.tb:hover{color:var(--text);}
.tb.on{color:var(--accent-text);border-bottom-color:var(--accent);}
.tpanel{display:none;}.tpanel.on{display:block;}

/* Accordion */
.acc{border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:7px;overflow:hidden;transition:border-color .2s;}
.acc.open{border-color:var(--border2);}
.atrig{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;background:var(--bg);gap:10px;user-select:none;transition:background .15s;}
.atrig:hover{background:var(--bg2);}
.atrig-l{display:flex;align-items:flex-start;gap:10px;}
.aico{width:24px;height:24px;border-radius:50%;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.ic-b{background:var(--info-bg);color:var(--info-text);}
.ic-r{background:var(--danger-bg);color:var(--danger-text);}
.ic-a{background:var(--warn-bg);color:var(--warn-text);}
.ic-g{background:var(--success-bg);color:var(--success-text);}
.a-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.3;}
.a-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.a-arr{font-size:10px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.acc.open .a-arr{transform:rotate(180deg);}
.abody{display:none;border-top:0.5px solid var(--border);padding:15px 15px 13px;}
.acc.open .abody{display:block;}

/* Text */
.txt{font-size:13px;line-height:1.8;color:var(--text2);margin-bottom:10px;}
.txt:last-child{margin-bottom:0;}
.txt strong{font-weight:500;color:var(--text);}
.txt em{font-style:italic;}

/* Callouts */
.co{border-radius:var(--r);padding:11px 13px;margin:10px 0;display:flex;gap:9px;align-items:flex-start;}
.co-a{background:var(--warn-bg);}.co-a .ctx{color:var(--warn-text);}
.co-b{background:var(--info-bg);}.co-b .ctx{color:var(--info-text);}
.co-g{background:var(--success-bg);}.co-g .ctx{color:var(--success-text);}
.co-r{background:var(--danger-bg);}.co-r .ctx{color:var(--danger-text);}
.coi{font-size:14px;flex-shrink:0;margin-top:1px;}
.ctx{font-size:13px;line-height:1.65;}
.ctx strong{font-weight:500;}

/* Mnemonic */
.mnem{border:0.5px solid var(--success-border);border-radius:var(--r);background:var(--success-bg);padding:13px 14px;margin:12px 0;}
.mnem-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--success-text);margin-bottom:7px;}
.mnem-word{font-size:17px;font-weight:600;color:var(--success-text);letter-spacing:.05em;margin-bottom:7px;}
.mnem-rows{display:flex;flex-direction:column;gap:4px;}
.mnem-row{display:flex;gap:9px;align-items:baseline;}
.mnem-L{font-size:15px;font-weight:600;color:var(--success-text);width:18px;flex-shrink:0;}
.mnem-m{font-size:13px;color:var(--success-text);opacity:.9;}

/* Compare */
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:10px 0;}
.cmp-col{border-radius:var(--r);overflow:hidden;border:0.5px solid var(--border);}
.cmp-h{padding:7px 11px;font-size:12px;font-weight:500;}
.ch-r{background:var(--danger-bg);color:var(--danger-text);}
.ch-b{background:var(--info-bg);color:var(--info-text);}
.ch-g{background:var(--success-bg);color:var(--success-text);}
.ch-a{background:var(--warn-bg);color:var(--warn-text);}
.cmp-row{padding:6px 11px;font-size:12px;color:var(--text2);border-top:0.5px solid var(--border);line-height:1.5;}
.cmp-row:nth-child(even){background:var(--bg2);}
.cmp-row .def{font-size:11px;color:var(--text3);font-style:italic;}

/* Steps */
.steps{margin:10px 0;}
.step{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;}
.sn{width:24px;height:24px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--border2);font-size:11px;font-weight:500;color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.stitle{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;}
.sdesc{font-size:12px;color:var(--text2);line-height:1.65;}
.sdesc strong{font-weight:500;color:var(--text);}
.sarr{text-align:center;font-size:11px;color:var(--text3);margin:1px 0 3px 34px;}

/* Two col */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:10px 0;}
.mini{background:var(--bg2);border-radius:var(--r);padding:10px 12px;}
.mini-lbl{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.mini-val{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;}
.mini-sub{font-size:11px;color:var(--text2);line-height:1.5;}

/* Gene bars */
.gbr{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.gn{font-size:12px;font-weight:500;color:var(--text);width:68px;flex-shrink:0;}
.gtrack{flex:1;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden;}
.gfill{height:100%;border-radius:4px;background:var(--accent);}
.gpct{font-size:12px;font-weight:500;color:var(--accent-text);width:34px;flex-shrink:0;text-align:right;}
.gnote{font-size:11px;color:var(--text3);margin:-3px 0 9px 77px;line-height:1.5;}

/* Drug cards */
.drug{border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:9px;}
.drug-h{padding:9px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border);}
.drug-name{font-size:14px;font-weight:500;color:var(--text);}
.dbadge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;}
.db-1{background:var(--success-bg);color:var(--success-text);}
.db-2{background:var(--info-bg);color:var(--info-text);}
.db-p{background:var(--warn-bg);color:var(--warn-text);}
.drug-b{padding:10px 13px;}
.drug-mech{font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:7px;}
.dstats{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.ds{background:var(--bg2);border-radius:var(--r);padding:6px 9px;}
.ds-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px;}
.ds-val{font-size:12px;font-weight:500;color:var(--text);}

/* Timeline */
.tl{padding-left:20px;position:relative;}
.tl::before{content:'';position:absolute;left:6px;top:6px;bottom:6px;width:0.5px;background:var(--border2);}
.tl-item{position:relative;margin-bottom:13px;}
.tl-dot{position:absolute;left:-16px;top:5px;width:9px;height:9px;border-radius:50%;border:0.5px solid var(--border2);background:var(--bg);}
.tl-dot.i{border-color:var(--accent);background:var(--info-bg);}
.tl-dot.w{border-color:var(--warn-text);background:var(--warn-bg);}
.tl-dot.d{border-color:var(--danger-text);background:var(--danger-bg);}
.tl-lbl{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:1px;}
.tl-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;}
.tl-desc{font-size:12px;color:var(--text2);line-height:1.6;}

/* Symptom grid */
.sym-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:10px 0;}
.sym-card{border:0.5px solid var(--border);border-radius:var(--r);padding:9px 11px;}
.sym-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px;}
.sym-tx{font-size:11px;color:var(--text2);line-height:1.5;}

/* ── SUMMARY TAB ── */
.summary-section{margin-bottom:18px;}
.sum-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;}
.sum-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.si-b{background:var(--info-bg);}
.si-r{background:var(--danger-bg);}
.si-g{background:var(--success-bg);}
.si-a{background:var(--warn-bg);}
.sum-items{display:flex;flex-direction:column;gap:6px;}
.sum-item{display:flex;gap:9px;align-items:flex-start;}
.sum-bullet{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:6px;}
.sb-b{background:var(--accent);}
.sb-r{background:var(--danger-text);}
.sb-g{background:var(--success-text);}
.sb-a{background:var(--warn-text);}
.sum-text{font-size:13px;color:var(--text2);line-height:1.65;}
.sum-text strong{font-weight:500;color:var(--text);}
.sum-text .def{font-size:11px;color:var(--text3);font-style:italic;margin-left:4px;}
.must-know{background:var(--danger-bg);border:0.5px solid var(--danger-border);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;}
.must-title{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--danger-text);margin-bottom:8px;}
.must-item{font-size:13px;color:var(--danger-text);line-height:1.7;padding-left:14px;position:relative;}
.must-item::before{content:'→';position:absolute;left:0;font-weight:600;}

/* Quiz */
.qwrap{padding:2px 0;}
.qprog{font-size:11px;color:var(--text3);margin-bottom:9px;}
.qq{font-size:14px;font-weight:500;color:var(--text);line-height:1.5;margin-bottom:13px;}
.qopts{display:flex;flex-direction:column;gap:6px;margin-bottom:11px;}
.qopt{font-size:13px;padding:10px 13px;text-align:left;border:0.5px solid var(--border2);border-radius:var(--r);cursor:pointer;background:var(--bg);color:var(--text);font-family:inherit;transition:all .15s;}
.qopt:hover:not(:disabled){background:var(--bg2);border-color:var(--accent);}
.qopt.correct{background:var(--success-bg);border-color:var(--success-text);color:var(--success-text);}
.qopt.wrong{background:var(--danger-bg);border-color:var(--danger-text);color:var(--danger-text);}
.qfb{font-size:13px;line-height:1.65;padding:10px 13px;border-radius:var(--r);background:var(--bg2);border:0.5px solid var(--border);color:var(--text2);display:none;margin-bottom:9px;}
.qnext{font-size:12px;padding:8px 15px;border:0.5px solid var(--border2);border-radius:var(--r);cursor:pointer;background:var(--bg);color:var(--text);font-family:inherit;transition:background .15s;display:none;}
.qnext:hover{background:var(--bg2);}
.qscore{text-align:center;padding:22px;background:var(--bg2);border-radius:var(--rl);border:0.5px solid var(--border);display:none;}
.qsnum{font-size:38px;font-weight:600;color:var(--accent-text);}
.qslbl{font-size:13px;color:var(--text2);margin-bottom:13px;}
.qsbtn{font-size:13px;font-weight:500;padding:9px 19px;background:var(--info-bg);color:var(--info-text);border:0.5px solid var(--info-border);border-radius:var(--r);cursor:pointer;font-family:inherit;}

/* Case */
.case-vig{background:var(--bg2);border-radius:var(--rl);padding:15px 17px;margin-bottom:13px;border:0.5px solid var(--border);}
.case-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-text);margin-bottom:7px;}
.case-text{font-size:13px;line-height:1.8;color:var(--text2);}
.case-text strong{font-weight:500;color:var(--text);}
.cqcard{border:0.5px solid var(--border);border-radius:var(--rl);padding:15px 17px;margin-bottom:11px;}
.cqlbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:7px;}
.cqtxt{font-size:14px;font-weight:500;color:var(--text);margin-bottom:11px;line-height:1.5;}
.copts{display:flex;flex-direction:column;gap:6px;}
.copt{font-size:13px;padding:10px 13px;text-align:left;border:0.5px solid var(--border2);border-radius:var(--r);cursor:pointer;background:var(--bg2);color:var(--text);font-family:inherit;transition:all .15s;}
.copt:hover:not(:disabled){background:var(--bg);border-color:var(--accent);}
.copt.correct{background:var(--success-bg);border-color:var(--success-text);color:var(--success-text);}
.copt.wrong{background:var(--danger-bg);border-color:var(--danger-text);color:var(--danger-text);}
.cfb{font-size:12px;line-height:1.65;padding:10px 13px;border-radius:var(--r);background:var(--bg2);border:0.5px solid var(--border);color:var(--text2);display:none;margin-top:9px;}
.cnext{font-size:12px;padding:8px 15px;border:0.5px solid var(--border2);border-radius:var(--r);cursor:pointer;background:var(--bg);color:var(--text);font-family:inherit;margin-top:9px;display:none;}
.cnext:hover{background:var(--bg2);}
.cscore{text-align:center;padding:20px;background:var(--bg2);border-radius:var(--rl);border:0.5px solid var(--border);}
.csnum{font-size:34px;font-weight:600;color:var(--accent-text);}
.cslbl{font-size:13px;color:var(--text2);margin-bottom:13px;}
.csbtn{font-size:13px;font-weight:500;padding:9px 19px;background:var(--info-bg);color:var(--info-text);border:0.5px solid var(--info-border);border-radius:var(--r);cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div id="app">
<div id="hdr">
  <div class="logo" onclick="goHome()">MED<span>-ED</span></div>
  <div id="hdr-score"></div>
</div>
<div id="bc"></div>

<!-- HOME -->
<div class="view on" id="v-home">
  <div class="slbl">Choose a system</div>
  <div class="card-grid" id="sys-cards"></div>
</div>

<!-- GROUP -->
<div class="view" id="v-group">
  <button class="back" onclick="goHome()">← All systems</button>
  <div class="slbl" id="grp-lbl"></div>
  <div class="card-grid" id="grp-cards"></div>
</div>

<!-- DISEASE LIST -->
<div class="view" id="v-disease">
  <button class="back" id="dis-back">← Back</button>
  <div class="slbl" id="dis-lbl"></div>
  <div class="card-grid" id="dis-cards"></div>
</div>

<!-- DISEASE DETAIL -->
<div class="view" id="v-detail">
  <button class="back" id="det-back">← Back</button>
  <div class="disease-hero">
    <div class="dh-tag" id="det-tag"></div>
    <div class="dh-title" id="det-title"></div>
    <div class="dh-hook" id="det-hook"></div>
  </div>
  <div class="pill-row" id="det-pills"></div>
  <div class="tab-bar" id="det-tabs"></div>
  <div id="det-content"></div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════
const SYSTEMS=[
  {id:'neuro',icon:'🧠',name:'Neurology',sub:'Brain, spinal cord, nerves',groups:['neurodegen','demyelinating','neuromuscular','cerebrovascular','epilepsy']},
  {id:'cardio',icon:'❤️',name:'Cardiology',sub:'Heart & vessels',groups:['heartfailure','arrhythmia','ischemic','valvular','pericardial']},
  {id:'pulmo',icon:'🫁',name:'Pulmonology',sub:'Lungs & airways',groups:['obstructive','restrictive','infectious_lung','vascular_lung','pleural']},
  {id:'gastro',icon:'🫃',name:'Gastroenterology',sub:'GI tract & liver',groups:['ibd','liver','pancreas','gastric','colorectal']},
