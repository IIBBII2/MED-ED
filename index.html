<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALS — Discover the Disease</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

/* ══ DARK MODE (default) ══ */
:root{
  --bg:#0c0c10;--surface:#141418;--surface2:#1e1e28;--surface3:#282836;
  --text:#f0f0f6;--text2:#b8b8d0;--text3:#8080a0;
  --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.17);
  --purple:#7c6df0;--purple2:#b8aff8;--purple3:rgba(124,109,240,.18);
  --green:#3dd68c;--amber:#f5a623;--red:#f06b6b;--blue:#5ba4f5;
  --r:14px;--rl:20px;
  --shadow:rgba(0,0,0,.4);
  --blob-opacity:.06;
}

/* ══ WARM CREAM LIGHT MODE ══ */
:root[data-theme="light"]{
  --bg:#faf8f4;--surface:#f2ede4;--surface2:#e8e0d5;--surface3:#ddd5c6;
  --text:#1c1814;--text2:#4d4540;--text3:#8a7e72;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.15);
  --purple3:rgba(124,109,240,.1);
  --shadow:rgba(0,0,0,.12);
  --blob-opacity:.04;
}
:root[data-theme="light"] .btn-done{color:#fff;}
:root[data-theme="light"] .bg-blob{opacity:var(--blob-opacity);}
:root[data-theme="light"] .fact-card{background:linear-gradient(135deg,rgba(124,109,240,.1),rgba(124,109,240,.03));}
:root[data-theme="light"] .reveal-result.good{background:rgba(61,214,140,.08);}
:root[data-theme="light"] .reveal-result.bad{background:rgba(240,107,107,.08);}
:root[data-theme="light"] .vacc-trigger{background:var(--surface);}
:root[data-theme="light"] .vacc-trigger:hover,:root[data-theme="light"] .vacc-trigger.opened{background:var(--surface2);}
:root[data-theme="light"] .vacc-body{background:var(--surface2);}
:root[data-theme="light"] #bottom,:root[data-theme="light"] #bar{background:var(--bg);}

html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;}

/* ── SHELL ── */
#game{width:100%;height:100%;height:100dvh;display:flex;flex-direction:column;position:relative;}

/* ── TOP BAR ── */
#bar{display:flex;align-items:center;gap:10px;padding:12px 16px;flex-shrink:0;z-index:10;border-bottom:0.5px solid var(--border);background:var(--bg);}
#bar-back{font-size:20px;cursor:pointer;color:var(--text3);transition:color .2s;flex-shrink:0;line-height:1;padding:4px;min-width:32px;}
#bar-back:hover{color:var(--text);}
#bar-track{flex:1;height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;min-width:0;}
#bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--purple),var(--purple2));transition:width .6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(124,109,240,.4);}
#bar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
#bar-xp{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--amber);white-space:nowrap;}
#bar-hearts{font-size:12px;letter-spacing:1px;white-space:nowrap;}
#theme-toggle{background:none;border:0.5px solid var(--border2);border-radius:20px;padding:5px 9px;cursor:pointer;font-size:14px;color:var(--text3);transition:all .2s;flex-shrink:0;line-height:1;}
#theme-toggle:hover{border-color:var(--purple);color:var(--text);}

/* ── STAGE ── */
#stage{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.screen{display:flex;flex-direction:column;align-items:center;padding:20px 18px 12px;min-height:100%;}
.screen.hidden{display:none;}

/* ── TRANSITIONS ── */
@keyframes slideIn{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes popIn{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:scale(1);}}
.anim-slide{animation:slideIn .38s cubic-bezier(.4,0,.2,1) forwards;}
.anim-fade{animation:fadeIn .3s ease forwards;}
.anim-pop{animation:popIn .28s cubic-bezier(.4,0,.2,1) forwards;}

/* ── SCENE WRAPPER ── */
.scene{width:100%;max-width:540px;display:flex;flex-direction:column;gap:0;}

/* ════════════════════════════════
   MAP SCREEN — cinematic
════════════════════════════════ */
#map-screen{background:var(--bg);justify-content:flex-start;}
.map-top{text-align:center;margin-bottom:24px;padding-top:12px;}
.map-eyebrow{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--purple2);margin-bottom:14px;}
.map-title{font-family:'Syne',sans-serif;font-size:clamp(38px,10vw,64px);font-weight:800;line-height:1.0;margin-bottom:12px;letter-spacing:-.02em;}
.map-title em{font-style:normal;background:linear-gradient(135deg,var(--purple),var(--purple2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.map-sub{font-size:14px;color:var(--text2);line-height:1.7;max-width:360px;margin:0 auto;}

.map-stats{display:flex;gap:8px;justify-content:center;margin-bottom:28px;}
.mstat{text-align:center;padding:10px 16px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);flex:1;max-width:110px;}
.mstat-n{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:2px;}
.mstat-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);}

/* ── DISCIPLINE PATH MAP ── */
.path-section{width:100%;max-width:500px;padding-bottom:40px;}

/* Discipline header pill */
.disc-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:40px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;}
.disc-pill-icon{font-size:15px;}

/* Case card — the actual path node */
.case-card{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px 20px 18px;margin-bottom:12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.case-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,109,240,.06),transparent 60%);pointer-events:none;}
.case-card.active{border-color:rgba(124,109,240,.5);box-shadow:0 0 32px rgba(124,109,240,.15),0 4px 20px rgba(0,0,0,.3);}
.case-card:hover:not(.case-locked){border-color:rgba(124,109,240,.4);box-shadow:0 0 24px rgba(124,109,240,.12),0 4px 16px rgba(0,0,0,.25);transform:translateY(-2px);}
.case-card.case-done{border-color:rgba(61,214,140,.35);background:rgba(61,214,140,.04);}
.case-card.case-done::before{background:linear-gradient(135deg,rgba(61,214,140,.06),transparent 60%);}
.case-card.case-locked{opacity:.35;cursor:not-allowed;pointer-events:none;}

.case-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.case-patient{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--text);line-height:1.2;}
.case-hook{font-size:13px;color:var(--text2);margin-top:3px;line-height:1.5;}
.case-status{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;flex-shrink:0;margin-left:12px;margin-top:2px;}
.case-status.s-active{background:rgba(124,109,240,.18);color:var(--purple2);}
.case-status.s-done{background:rgba(61,214,140,.15);color:var(--green);}
.case-status.s-locked{background:var(--surface2);color:var(--text3);}

/* Chapter progress dots inside case card */
.case-chapters{display:flex;align-items:center;gap:0;margin:14px 0 16px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.cc-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .2s;position:relative;}
.cc-dot.ch-done{background:rgba(61,214,140,.15);border:2px solid rgba(61,214,140,.5);}
.cc-dot.ch-active{background:rgba(124,109,240,.18);border:2px solid var(--purple);box-shadow:0 0 10px rgba(124,109,240,.35);animation:nodePulse 2.5s ease-in-out infinite;}
.cc-dot.ch-locked{background:var(--surface2);border:2px solid var(--border);opacity:.35;}
.cc-line{flex:1;height:2px;background:repeating-linear-gradient(to right,var(--border2) 0,var(--border2) 5px,transparent 5px,transparent 10px);min-width:8px;}
.cc-line.line-done{background:rgba(61,214,140,.4);}

.case-cta{font-size:13px;font-weight:700;color:var(--purple2);display:flex;align-items:center;gap:6px;}
.case-cta::after{content:'→';transition:transform .2s;}
.case-card:hover .case-cta::after{transform:translateX(4px);}
.case-card.case-done .case-cta{color:var(--green);}

/* Coming-soon discipline sections */
.disc-coming{opacity:.3;pointer-events:none;margin-top:8px;}
@keyframes nodePulse{0%,100%{box-shadow:0 0 0 6px rgba(124,109,240,.1),0 4px 20px rgba(124,109,240,.3);}50%{box-shadow:0 0 0 14px rgba(124,109,240,.05),0 4px 28px rgba(124,109,240,.4);}}

/* ════════════════════════════════
   LESSON SCREEN
════════════════════════════════ */
#lesson-screen{justify-content:flex-start;}

/* ════════════════════════════════
   MOMENT — cinematic, full bleed feel
════════════════════════════════ */
.moment{text-align:center;display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;padding-top:8px;}
.moment-visual{width:100%;max-width:420px;border-radius:var(--rl);overflow:hidden;}
.moment-visual svg{display:block;width:100%;height:auto;}

.moment-tag{
  font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--purple2);
  display:inline-flex;align-items:center;gap:8px;
}
.moment-tag::before,.moment-tag::after{content:'';display:block;width:24px;height:1.5px;background:var(--purple2);opacity:.4;}

.moment-title{
  font-family:'Syne',sans-serif;
  font-size:clamp(34px,7.5vw,54px);
  font-weight:800;line-height:1.08;
  max-width:460px;
  letter-spacing:-.02em;
}
.moment-body{font-size:16px;color:var(--text2);line-height:1.8;max-width:420px;}
.moment-body strong{font-weight:600;color:var(--text);}

/* ════════════════════════════════
   CHOICE / TAP / MATCH — bigger prompts
════════════════════════════════ */
.choice-prompt{font-family:'Syne',sans-serif;font-size:clamp(22px,5.5vw,32px);font-weight:800;text-align:center;line-height:1.2;margin-bottom:8px;letter-spacing:-.01em;}
.choice-sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:20px;line-height:1.6;}
.choices{display:grid;gap:11px;width:100%;}
.choices.grid-2{grid-template-columns:1fr 1fr;}
.choices.grid-1{grid-template-columns:1fr;}

/* ── CHOICE CARDS ── */
.choice{
  padding:18px 16px;
  background:var(--surface);
  border:1.5px solid var(--border2);
  border-radius:18px;
  cursor:pointer;
  transition:all .18s cubic-bezier(.4,0,.2,1);
  display:flex;
  align-items:flex-start;
  gap:13px;
  font-family:inherit;
  text-align:left;
  width:100%;
  box-shadow:0 3px 10px rgba(0,0,0,.22),0 1px 3px rgba(0,0,0,.15);
  position:relative;
  overflow:hidden;
}
.choice::before{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,.04) 0%,transparent 60%);pointer-events:none;}
.choice:hover:not(:disabled){
  background:var(--surface2);
  border-color:rgba(124,109,240,.5);
  transform:translateY(-3px) scale(1.01);
  box-shadow:0 8px 24px rgba(0,0,0,.3),0 0 0 1px rgba(124,109,240,.2);
}
.choice:active:not(:disabled){transform:translateY(-1px) scale(1);}

/* grid-2: icon on top, centered — feels like game cards */
.choices.grid-2 .choice{
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding:22px 12px 18px;
  gap:10px;
}
.choices.grid-2 .choice-ico{font-size:36px;margin-top:0;}
.choices.grid-2 .choice-text{font-size:13px;}

.choice-ico{font-size:24px;flex-shrink:0;line-height:1;margin-top:1px;}
.choice-text{font-size:14px;font-weight:500;color:var(--text);line-height:1.55;}

/* States */
.choice.correct{
  background:rgba(61,214,140,.12);
  border-color:var(--green);
  box-shadow:0 0 24px rgba(61,214,140,.2),0 4px 12px rgba(0,0,0,.2);
  transform:none;
}
.choice.correct .choice-text{color:var(--green);}
.choice.wrong{
  background:rgba(240,107,107,.1);
  border-color:var(--red);
  box-shadow:0 0 16px rgba(240,107,107,.15);
  transform:none;
}
.choice.wrong .choice-text{color:var(--red);}
.choice.dim{opacity:.22;transform:none;box-shadow:none;}
.choice:disabled{cursor:default;}

/* ── REVEAL RESULT — more dramatic ── */
.reveal-result{border-radius:var(--rl);padding:20px 20px;margin-top:16px;}
.reveal-result.good{background:rgba(61,214,140,.1);border:1px solid rgba(61,214,140,.35);box-shadow:0 0 24px rgba(61,214,140,.1);}
.reveal-result.bad{background:rgba(240,107,107,.09);border:1px solid rgba(240,107,107,.3);}
.reveal-emoji{font-size:30px;margin-bottom:8px;}
.reveal-verdict{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:8px;}
.reveal-explain{font-size:14px;color:var(--text2);line-height:1.85;}
.reveal-explain strong{font-weight:600;color:var(--text);}

/* ── FLASH OVERLAY ── */
#answer-flash{position:fixed;inset:0;pointer-events:none;z-index:500;opacity:0;}
@keyframes flashGreen{0%{opacity:0;}20%{opacity:.18;}100%{opacity:0;}}
@keyframes flashRed{0%{opacity:0;}20%{opacity:.14;}100%{opacity:0;}}
.flash-good{background:var(--green);animation:flashGreen .6s ease forwards;}
.flash-bad{background:var(--red);animation:flashRed .6s ease forwards;}

/* ── STORY VISUAL ── */
.story-visual{width:100%;border-radius:var(--rl);background:var(--surface);border:0.5px solid var(--border);overflow:hidden;margin-bottom:14px;}
.story-visual svg{display:block;width:100%;height:auto;}

/* ── TAP-ALL ── */
.tap-wrap{width:100%;}
.tap-prompt{font-family:'Syne',sans-serif;font-size:clamp(22px,5.5vw,32px);font-weight:800;text-align:center;margin-bottom:8px;line-height:1.2;letter-spacing:-.01em;}
.tap-sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:18px;}
.tap-grid{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;}
.tap-chip{padding:11px 20px;background:var(--surface);border:1px solid var(--border2);border-radius:40px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:all .15s;font-family:inherit;}
.tap-chip:hover:not(:disabled){background:var(--surface2);border-color:var(--purple);color:var(--text);}
.tap-chip.on{background:rgba(124,109,240,.18);border-color:var(--purple);color:var(--purple2);}
.tap-chip.correct{background:rgba(61,214,140,.14);border-color:var(--green);color:var(--green);}
.tap-chip.missed{background:rgba(61,214,140,.06);border-color:rgba(61,214,140,.2);color:rgba(61,214,140,.5);}
.tap-chip.wrong{background:rgba(240,107,107,.12);border-color:var(--red);color:var(--red);}

/* ── MATCH ── */
.match-wrap{width:100%;}
.match-prompt{font-family:'Syne',sans-serif;font-size:clamp(22px,5.5vw,32px);font-weight:800;text-align:center;margin-bottom:18px;line-height:1.2;letter-spacing:-.01em;}
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.match-col{display:flex;flex-direction:column;gap:9px;}
.match-chip{padding:14px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;line-height:1.45;text-align:center;font-family:inherit;width:100%;}
.match-chip:hover:not(.matched){background:var(--surface2);border-color:var(--purple);color:var(--text);}
.match-chip.sel{border-color:var(--purple2);background:var(--purple3);color:var(--purple2);}
.match-chip.matched{border-color:rgba(61,214,140,.4);background:rgba(61,214,140,.1);color:var(--green);cursor:default;}
.match-chip.flash-wrong{animation:flashWrong .4s ease;}
@keyframes flashWrong{0%,100%{border-color:var(--border2);}50%{border-color:var(--red);background:rgba(240,107,107,.14);}}

/* ── FACT CARD ── */
.fact-card{background:linear-gradient(135deg,rgba(124,109,240,.14),rgba(124,109,240,.04));border:1px solid rgba(124,109,240,.3);border-radius:var(--rl);padding:28px 24px;text-align:center;width:100%;}
.fact-icon{font-size:40px;margin-bottom:14px;}
.fact-label{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--purple2);margin-bottom:10px;}
.fact-text{font-family:'Syne',sans-serif;font-size:clamp(22px,5vw,30px);font-weight:800;line-height:1.25;letter-spacing:-.01em;}
.fact-sub{font-size:14px;color:var(--text2);margin-top:12px;line-height:1.75;}

/* ── VERTICAL ACCORDION ── */
.vacc-wrap{width:100%;border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden;}
.vacc-item{border-bottom:0.5px solid var(--border);}
.vacc-item:last-child{border-bottom:none;}
.vacc-trigger{display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;background:var(--surface);transition:background .15s;width:100%;text-align:left;border:none;font-family:inherit;}
.vacc-trigger:hover,.vacc-trigger.opened{background:var(--surface2);}
.vacc-num{width:32px;height:32px;border-radius:50%;background:var(--surface3);border:0.5px solid var(--border2);font-size:13px;font-weight:700;color:var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s;}
.vacc-num.done{background:rgba(61,214,140,.15);border-color:rgba(61,214,140,.4);color:var(--green);}
.vacc-label{flex:1;}
.vacc-title{font-size:15px;font-weight:700;color:var(--text);line-height:1.3;}
.vacc-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.vacc-arr{font-size:11px;color:var(--text3);transition:transform .25s;flex-shrink:0;}
.vacc-trigger.opened .vacc-arr{transform:rotate(180deg);}
.vacc-body{display:none;padding:16px 18px 18px 62px;background:var(--surface2);border-top:0.5px solid var(--border);font-size:14px;color:var(--text2);line-height:1.85;}
.vacc-body.open{display:block;}
.vacc-body strong{font-weight:600;color:var(--text);}
.nv-row{display:flex;align-items:center;justify-content:center;gap:18px;margin:12px 0 8px;}
.nv-cell{display:flex;flex-direction:column;align-items:center;gap:5px;}
.nv-dot{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;}
.nv-dot-live{background:rgba(61,214,140,.18);border:2px solid var(--green);}
.nv-dot-dead{background:rgba(240,107,107,.12);border:2px dashed var(--red);opacity:.55;}
.nv-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.nv-arrow{font-size:22px;color:var(--text3);}
.nv-muscle{width:56px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
.nv-muscle-ok{background:rgba(61,214,140,.15);border:1.5px solid var(--green);color:var(--green);}
.nv-muscle-waste{background:rgba(240,107,107,.1);border:1.5px dashed var(--red);color:var(--red);}

/* ── SIGN CARDS ── */
.sign-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;}
.sign-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .2s;}
.sign-card.umno{border-color:rgba(240,107,107,.35);background:rgba(240,107,107,.06);}
.sign-card.lmno{border-color:rgba(91,164,245,.35);background:rgba(91,164,245,.06);}
.sign-emoji{font-size:24px;margin-bottom:8px;}
.sign-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px;}
.sign-desc{font-size:12px;color:var(--text2);line-height:1.5;}
.sign-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;margin-top:6px;}
.badge-umno{background:rgba(240,107,107,.15);color:var(--red);}
.badge-lmno{background:rgba(91,164,245,.15);color:var(--blue);}

/* ── DEPTH BUTTON ── */
.depth-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;background:none;border:0.5px solid var(--border);border-radius:40px;padding:8px 18px;font-family:inherit;transition:all .15s;margin:16px auto 0;}
.depth-btn:hover{border-color:var(--border2);color:var(--text2);}

<script>
// ══════════════════════════
//  THEME
// ══════════════════════════
(function(){
  const t = localStorage.getItem('meded_theme') || 'dark';
  if(t === 'light') document.documentElement.setAttribute('data-theme','light');
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('theme-toggle');
    if(btn) btn.textContent = t === 'light' ? '🌙' : '☀️';
  });
})();

function toggleTheme(){
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const next = isLight ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next === 'dark' ? '' : 'light');
  if(next === 'dark') document.documentElement.removeAttribute('data-theme');
  localStorage.setItem('meded_theme', next);
  document.getElementById('theme-toggle').textContent = next === 'light' ? '🌙' : '☀️';
}

// ── ANSWER FLASH ──
function flashScreen(good){
  const el = document.getElementById('answer-flash');
  el.className = '';
  void el.offsetWidth;
  el.className = good ? 'flash-good' : 'flash-bad';
}

// ══════════════════════════
//  STATE
// ══════════════════════════
let XP = +localStorage.getItem('als2_xp')||0;
let done = JSON.parse(localStorage.getItem('als2_done')||'[]');
let tc = +localStorage.getItem('als2_tc')||0;
let ta = +localStorage.getItem('als2_ta')||0;
let hearts = 3;
let curChapter = null, curStep = 0, stepDone = false;
let lvlCorrect = 0, lvlTotal = 0;

function save(){
  localStorage.setItem('als2_xp',XP);
  localStorage.setItem('als2_done',JSON.stringify(done));
  localStorage.setItem('als2_tc',tc);
  localStorage.setItem('als2_ta',ta);
}

// ══════════════════════════
//  CHAPTERS
// ══════════════════════════
const CHAPTERS = [

// ─── CHAPTER 0: THE PATIENT ───
{id:0,icon:'🚪',color:'rgba(124,109,240,.18)',name:'The patient walks in',desc:'Your first clue walks in the door',xp:80,
steps:[
  // 0 — scene setter
  {type:'moment',
   tag:'Rotterdam · Tuesday 9am',
   title:'Jan de Vries, 54, walks into your clinic.',
   body:'He\'s a civil engineer. Fit, used to being capable with his hands. His wife is in the waiting room — she drove him in today. He\'s been putting this appointment off for eight months.',
   visual:'patient'},

  // 1 — choice: what do you notice?
  {type:'choice', layout:'grid-2',
   prompt:'He shakes your hand. Something feels off. What do you notice?',
   sub:'Pick the one that stands out.',
   choices:[
     {ico:'🤝',text:'His grip is weak — he can barely squeeze', value:'weak', correct:true},
     {ico:'👁️',text:'He looks anxious', value:'anxious', correct:false},
     {ico:'🗣️',text:'His speech is slightly slurred', value:'speech', correct:false},
     {ico:'😰',text:'He\'s sweating heavily', value:'sweat', correct:false},
   ],
   feedback:{correct:'Good eye. The grip weakness is your first clue — and it\'s been getting worse for 8 months. That progression is the whole story.',
             wrong:'Good instinct — but the finding you can\'t walk past is the grip weakness. Eight months of one hand getting progressively weaker. That\'s not stress. That\'s not overuse. That\'s the signal.'}},

  // 2 — fact card
  {type:'fact',
   icon:'📋',
   label:'His story',
   text:'"I can\'t button my shirt anymore. I dropped a mug last week. I thought it was stress — my wife made me come."',
   sub:'Progressive. Worsening. Asymmetric — only the right hand. He waited eight months. This is not normal ageing.'},

  // 3 — visual: the hand
  {type:'moment',
   tag:'On examination',
   title:'You look at his right hand.',
   body:'The <strong>thumb muscle pad (thenar eminence)</strong> is visibly sunken — the muscle has wasted away. But when you tap his wrist tendon, the reflex jerks back hard. <strong>Too hard.</strong>',
   visual:'hand'},

  // 4 — choice: what does this combination mean?
  {type:'choice', layout:'grid-1',
   prompt:'A muscle that is wasted AND has an exaggerated reflex. What does this tell you?',
   sub:'Think about what controls a muscle.',
   choices:[
     {ico:'🤔',text:'Wasting = nerve to muscle is dying. Brisk reflex = something above that is also dying. Two systems failing simultaneously.', value:'a', correct:true},
     {ico:'💭',text:'The wasting is from disuse — he\'s not using the hand so it shrank. The reflex is just normal variation.', value:'b', correct:false},
     {ico:'❓',text:'These findings cancel each other out — you can\'t draw any conclusions.', value:'c', correct:false},
   ],
   feedback:{correct:'Exactly. Wasting = lower motor neuron dying (the nerve going to that muscle). Brisk reflex = upper motor neuron dying (the brain\'s command wire). Both at once — that combination is almost unique to one disease.',
             wrong:'Not quite — but this is one of the most important combinations in neurology. Wasting means the nerve to the muscle is dying (lower motor neuron). The brisk reflex means the brain\'s command neuron is also dying (upper motor neuron). Both failing simultaneously? That points to one diagnosis almost uniquely.'}},

  // hook
  {type:'moment',
   tag:'Something doesn\'t add up.',
   title:'Wasted muscle. Brisk reflex. Same hand.',
   body:'One system shouldn\'t do both. Wasting means the nerve to the muscle is dying. But a brisk reflex means the brain\'s command wire is overactive — as if the brake is gone. You\'ve never seen that combination behave this way before. You need to understand the architecture behind it.',
   visual:'hand'},
]},

// ─── CHAPTER 1: THE TWO SYSTEMS ───
{id:1,icon:'⚡',color:'rgba(91,164,245,.18)',name:'The two-neuron relay',desc:'Two wires. Both cutting at once.',xp:100,
steps:[
  // 0 — visual intro
  {type:'moment',
   tag:'Here\'s why it made no sense',
   title:'Your motor system is a two-neuron relay.',
   body:'One neuron starts in your brain. It hands the signal to a second neuron, which connects directly to the muscle. Most diseases destroy one or the other. ALS destroys <strong>both — simultaneously</strong>. That\'s the paradox.',
   visual:'relay'},

  // 1 — build the relay
  {type:'neuron-build',
   stages:[
     {label:'Normal', umNo:false, lmNo:false, muscle:'ok', caption:'UMN hands signal to LMN → muscle contracts normally'},
     {label:'UMN dies', umNo:true, lmNo:false, muscle:'ok', caption:'UMN gone → LMN loses braking → reflexes go wild'},
     {label:'LMN dies', umNo:false, lmNo:true, muscle:'waste', caption:'LMN gone → muscle gets no signal → wasting, twitching'},
     {label:'ALS: both', umNo:true, lmNo:true, muscle:'waste', caption:'Both die simultaneously → the paradox: brisk reflexes AND wasting'},
   ]},

  // 2 — tap the UMN signs
  {type:'tap',
   prompt:'UMN dies → you LOSE the brake. Which signs appear?',
   sub:'Tap all that apply.',
   chips:[
     {text:'Spasticity',correct:true},
     {text:'Muscle wasting',correct:false},
     {text:'Brisk reflexes',correct:true},
     {text:'Fasciculations',correct:false},
     {text:'Babinski sign',correct:true},
     {text:'Floppy muscles',correct:false},
     {text:'Clonus',correct:true},
     {text:'Absent reflexes',correct:false},
   ],
   depth:'<strong>Babinski sign:</strong> stroke the sole — big toe extends UP instead of curling down. Always abnormal in adults. <strong>Clonus:</strong> hold the foot bent up — ankle starts rhythmically jerking on its own. <strong>Spasticity:</strong> muscles resist movement like a clasp-knife. All of these come from LOSS of UMN inhibition — the brake is gone, everything overactivates.',
   feedback:'UMN signs = loss of inhibition = everything overactive. Spasticity, brisk reflexes, Babinski, clonus. Wasting and fasciculations are LMN signs — they come from the muscle losing its direct nerve supply.'},

  // 3 — sign gallery
  {type:'signs',
   title:'The signs — side by side',
   signs:[
     {emoji:'🔧',name:'Brisk reflexes',desc:'Tap tendon → exaggerated jerk',type:'umno'},
     {emoji:'🌀',name:'Spasticity',desc:'Muscles resist like a clasp-knife',type:'umno'},
     {emoji:'👆',name:'Babinski +',desc:'Stroke sole → big toe extends UP',type:'umno'},
     {emoji:'📳',name:'Clonus',desc:'Foot held up → rhythmic shaking',type:'umno'},
     {emoji:'💪',name:'Wasting',desc:'Muscle visibly shrinks',type:'lmno'},
     {emoji:'✨',name:'Fasciculations',desc:'Tiny twitches under skin',type:'lmno'},
     {emoji:'🪢',name:'Flaccidity',desc:'Muscle feels completely floppy',type:'lmno'},
     {emoji:'🔕',name:'Absent reflexes',desc:'Tap tendon → barely any response',type:'lmno'},
   ]},

  // 4 — pearl moment
  {type:'fact',
   icon:'🔑',
   label:'The clinical pearl',
   text:'Brisk reflex in a wasted, twitching muscle — same limb.',
   sub:'That combination is almost unique to one disease. Two systems failing at once. You recognise the pattern now.'},

  // hook
  {type:'moment',
   tag:'Now the harder question.',
   title:'You know the paradox. But why these specific cells?',
   body:'Out of every neuron in the body — why do motor neurons die while everything else survives? There\'s a specific answer. Four design flaws that make them uniquely, catastrophically vulnerable to exactly what\'s happening to Jan.',
   visual:'neuron'},
]},

// ─── CHAPTER 2: WHAT IS KILLING THEM? ───
{id:2,icon:'🔬',color:'rgba(245,158,11,.15)',name:'Inside the neuron',desc:'Why these cells? There\'s a reason.',xp:120,
steps:[
  // 0
  {type:'moment',
   tag:'Why these specific cells?',
   title:'Motor neurons are uniquely bad at surviving ALS.',
   body:'Out of all the cells in your body, motor neurons are the most vulnerable to exactly what ALS does to them. It\'s not bad luck — it\'s four specific design flaws, all hitting at once.',
   visual:'neuron'},

  // 1 — four flaws reveal
  {type:'reveal-sequence',
   title:'Four design disasters',
   items:[

function openActiveCase(){
  const active=CHAPTERS.find((c,i)=>!done.includes(c.id)&&(i===0||done.includes(CHAPTERS[i-1].id)));
  if(active) startChapter(active.id);
  else if(done.length===CHAPTERS.length) startChapter(CHAPTERS[0].id);
}

//  START CHAPTER
// ══════════════════════════
function startChapter(id){
  curChapter=CHAPTERS.find(c=>c.id===id);
  curStep=0; stepDone=false; hearts=3;
  lvlCorrect=0; lvlTotal=0;
  document.getElementById('map-screen').classList.add('hidden');
  document.getElementById('lesson-screen').classList.remove('hidden');
  // Scroll stage back to top
  document.getElementById('stage').scrollTop=0;
  renderStep();
}

// ══════════════════════════
//  RENDER STEP
// ══════════════════════════
function renderStep(){
  const step=curChapter.steps[curStep];
  const pct=((curStep)/curChapter.steps.length)*100;
  document.getElementById('bar-fill').style.width=pct+'%';
  document.getElementById('bar-hearts').textContent='❤️'.repeat(hearts)+'🖤'.repeat(Math.max(0,3-hearts));

  const el=document.getElementById('lesson-content');
  el.innerHTML=getCaseBoardHTML()+buildStep(step);
  el.classList.remove('anim-slide');
  void el.offsetWidth;
  el.classList.add('anim-slide');

  // Set button
  const btn=document.getElementById('main-btn');
  if(['moment','fact','signs'].includes(step.type)){
    btn.textContent='Continue'; btn.className='main-btn btn-go'; stepDone=true;
  } else if(step.type==='diagnosis-commit'){
    btn.textContent='Select your diagnosis above'; btn.className='main-btn btn-check'; stepDone=false;
  } else if(step.type==='neuron-build'){
    window._nbOpened=new Set();
    btn.textContent=`Open all 4 stages to continue`; btn.className='main-btn btn-check'; stepDone=false;
  } else if(step.type==='reveal-sequence'){
    window._rsOpen=new Set(); checkRevealDone();
    stepDone=false;
  } else if(step.type==='badge'){
    btn.textContent='Back to map 🗺️'; btn.className='main-btn btn-done'; stepDone=true;
    completeChapter();
  } else {
    btn.textContent='Check'; btn.className='main-btn btn-check'; stepDone=false;
  }
}

function buildStep(step){
  if(step.type==='moment') return buildMoment(step);
  if(step.type==='fact') return buildFact(step);
  if(step.type==='choice') return buildChoice(step);
  if(step.type==='diagnosis-commit') return buildDiagnosisCommit(step);
  if(step.type==='tap') return buildTap(step);
  if(step.type==='match') return buildMatch(step);
  if(step.type==='signs') return buildSigns(step);
  if(step.type==='neuron-build') return buildNeuronBuild(step);
  if(step.type==='reveal-sequence') return buildRevealSeq(step);
  if(step.type==='badge') return buildBadge(step);
  return '';
}

function pickChoice(i){
  if(stepDone) return;
  _selectedChoice=i;
  document.querySelectorAll('.choice').forEach((el,j)=>el.classList.toggle('dim',j!==i));
  document.getElementById('ch'+i).classList.remove('dim');
  document.getElementById('ch'+i).style.borderColor='var(--purple)';
  const btn=document.getElementById('main-btn');
  const isDC = curChapter && curChapter.steps[curStep] && curChapter.steps[curStep].type==='diagnosis-commit';
  btn.textContent = isDC ? 'Commit to this diagnosis →' : 'Check';
  btn.className='main-btn btn-ready';
}

function checkChoice(){
  if(_selectedChoice<0) return;
  const step=curChapter.steps[curStep];
  const choice=step.choices[_selectedChoice];
  const correct=choice.correct;
  lvlTotal++; ta++;
  if(correct){lvlCorrect++;tc++;} else {hearts=Math.max(0,hearts-1);}
  save();
  document.querySelectorAll('.choice').forEach((el,i)=>{
    el.disabled=true; el.classList.remove('dim');
    el.style.borderColor='';
    if(step.choices[i].correct) el.classList.add('correct');
    else if(i===_selectedChoice&&!correct) el.classList.add('wrong');
    else el.classList.add('dim');
  });
  const fb=document.getElementById('choice-fb');
  fb.className='reveal-result '+(correct?'good':'bad');
  const wrongText = (typeof step.feedback.wrong === 'object')
    ? (step.feedback.wrong[choice.value] || step.feedback.wrong.default || 'Not quite.')
    : step.feedback.wrong;
  fb.innerHTML=`<div class="reveal-emoji">${correct?'✅':'❌'}</div>
    <div class="reveal-verdict" style="color:var(--${correct?'green':'red'})">${correct?'Exactly right.':'Not quite.'}</div>
    <div class="reveal-explain">${correct?step.feedback.correct:wrongText}</div>`;
  fb.style.display='block';
  flashScreen(correct);
  document.getElementById('bar-hearts').textContent='❤️'.repeat(hearts)+'🖤'.repeat(Math.max(0,3-hearts));
  const btn=document.getElementById('main-btn');
  btn.textContent='Continue'; btn.className='main-btn btn-go'; stepDone=true;
}

// TAP
let _tapped=new Set();
function buildTap(s){
  _tapped=new Set();
  return `<div class="tap-wrap anim-slide">
    <div class="tap-prompt">${glossify(s.prompt)}</div>
    <div class="tap-sub">${glossify(s.sub)}</div>
    <div class="tap-grid">${s.chips.map((c,i)=>`<button class="tap-chip" id="tc${i}" onclick="toggleTap(${i})">${c.text}</button>`).join('')}</div>
    <div id="tap-fb" style="display:none;margin-top:12px"></div>
    ${s.depth?`<button class="depth-btn" id="depth-btn" onclick="toggleDepth()">💡 More depth</button>
    <div class="depth-panel" id="depth-panel">${s.depth}</div>`:''}
  </div>`;
}
function toggleTap(i){
  if(stepDone) return;
  const el=document.getElementById('tc'+i);
  if(_tapped.has(i)){_tapped.delete(i);el.classList.remove('on');}
  else{_tapped.add(i);el.classList.add('on');}
  const btn=document.getElementById('main-btn');
  btn.textContent='Check'; btn.className=_tapped.size>0?'main-btn btn-ready':'main-btn btn-check';
}
function checkTap(){
  const step=curChapter.steps[curStep];
  let allRight=true;
  step.chips.forEach((c,i)=>{
    const el=document.getElementById('tc'+i);
    el.disabled=true;
    if(c.correct&&_tapped.has(i)){el.classList.remove('on');el.classList.add('correct');}
    else if(c.correct&&!_tapped.has(i)){el.classList.add('missed');allRight=false;}
    else if(!c.correct&&_tapped.has(i)){el.classList.remove('on');el.classList.add('wrong');allRight=false;}
  });
  lvlTotal++;ta++;
  if(allRight){lvlCorrect++;tc++;} else hearts=Math.max(0,hearts-1);
  save();
  const fb=document.getElementById('tap-fb');
  fb.className='reveal-result '+(allRight?'good':'bad');
  fb.innerHTML=`<div class="reveal-emoji">${allRight?'✅':'❌'}</div>
    <div class="reveal-verdict" style="color:var(--${allRight?'green':'red'})">${allRight?'All correct!':'Some were off.'}</div>
    <div class="reveal-explain">${step.feedback}</div>`;
  fb.style.display='block';
  flashScreen(allRight);
  document.getElementById('bar-hearts').textContent='❤️'.repeat(hearts)+'🖤'.repeat(Math.max(0,3-hearts));
  const btn=document.getElementById('main-btn');
  btn.textContent='Continue'; btn.className='main-btn btn-go'; stepDone=true;
}

// MATCH
let _matchSel=null,_matchDone=new Set();
function buildMatch(s){
  _matchSel=null;_matchDone=new Set();
  const rights=[...s.pairs.map(p=>p.right)].sort(()=>Math.random()-.5);
  window._matchPairs=s.pairs; window._matchRights=rights;
  const small=window.innerWidth<380;
  const colStyle=small?'display:flex;flex-direction:column;gap:7px;':'display:grid;grid-template-columns:1fr 1fr;gap:8px;';
  return `<div class="match-wrap anim-slide">
    <div class="match-prompt">${s.prompt}</div>
    <div style="${colStyle}">
      <div class="match-col">${s.pairs.map((p,i)=>`<button class="match-chip" id="ml${i}" onclick="selectMatchLeft(${i})">${p.left}</button>`).join('')}</div>
      <div class="match-col">${rights.map((r,i)=>`<button class="match-chip" id="mr${i}" onclick="selectMatchRight(${i})">${r}</button>`).join('')}</div>
    </div>
    <div id="match-fb" style="display:none;margin-top:10px"></div>
  </div>`;
}
function selectMatchLeft(i){
  if(_matchDone.has('l'+i)) return;
  _matchSel={side:'left',idx:i};
  document.querySelectorAll('[id^="ml"]').forEach(el=>el.classList.remove('sel'));
  document.getElementById('ml'+i).classList.add('sel');
}
function selectMatchRight(i){
  if(!_matchSel||_matchSel.side!=='left') return;
  if(_matchDone.has('r'+i)) return;
  const li=_matchSel.idx;
  const correct=window._matchRights[i]===window._matchPairs[li].right;
  if(correct){
    ['ml'+li,'mr'+i].forEach(id=>{
      document.getElementById(id).classList.remove('sel');
      document.getElementById(id).classList.add('matched');
      document.getElementById(id).disabled=true;
    });
    _matchDone.add('l'+li);_matchDone.add('r'+i);
    _matchSel=null;
    if(_matchDone.size===window._matchPairs.length*2){
      lvlTotal++;ta++;lvlCorrect++;tc++;save();
      const fb=document.getElementById('match-fb');
      fb.className='reveal-result good';
      fb.innerHTML='<div class="reveal-emoji">✅</div><div class="reveal-verdict" style="color:var(--green)">All matched!</div>';
      fb.style.display='block';
      const btn=document.getElementById('main-btn');
      btn.textContent='Continue';btn.className='main-btn btn-go';stepDone=true;
    }
  } else {
    document.getElementById('mr'+i).classList.add('flash-wrong');
    setTimeout(()=>document.getElementById('mr'+i).classList.remove('flash-wrong'),450);
    document.getElementById('ml'+li).classList.remove('sel');
    _matchSel=null;
    hearts=Math.max(0,hearts-1);
    document.getElementById('bar-hearts').textContent='❤️'.repeat(hearts)+'🖤'.repeat(Math.max(0,3-hearts));
  }
}

// NEURON BUILD — vertical accordion
function buildNeuronBuild(s){
  window._nbSteps=s.stages;
  window._nbOpened=new Set();
  const items=s.stages.map((stage,i)=>{
    const umnDead=stage.umNo, lmnDead=stage.lmNo, muscleWaste=stage.muscle==='waste';
    return `<div class="vacc-item">
      <button class="vacc-trigger" id="nbt${i}" onclick="toggleNB(${i})">
        <div class="vacc-num" id="nbn${i}">${i+1}</div>
        <div class="vacc-label">
          <div class="vacc-title">${stage.label}</div>
          <div class="vacc-sub">${stage.caption}</div>
        </div>
        <div class="vacc-arr" id="nba${i}">▼</div>
      </button>
      <div class="vacc-body" id="nbb${i}">
        <div class="nv-row">
          <div class="nv-cell">
            <div class="nv-dot ${umnDead?'nv-dot-dead':'nv-dot-live'}">${umnDead?'💀':'🧠'}</div>
            <div class="nv-label" style="color:${umnDead?'var(--red)':'var(--purple2)'}">UMN</div>
          </div>
          <div class="nv-arrow">${umnDead?'✕':'→'}</div>
          <div class="nv-cell">
            <div class="nv-dot ${lmnDead?'nv-dot-dead':'nv-dot-live'}">${lmnDead?'💀':'⚡'}</div>
            <div class="nv-label" style="color:${lmnDead?'var(--red)':'var(--blue)'}">LMN</div>
          </div>
          <div class="nv-arrow">${lmnDead?'✕':'→'}</div>
          <div class="nv-cell">
            <div class="nv-muscle ${muscleWaste?'nv-muscle-waste':'nv-muscle-ok'}">${muscleWaste?'💀':'💪'}</div>
            <div class="nv-label" style="color:${muscleWaste?'var(--red)':'var(--green)'}">Muscle</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
  return `<div class="anim-slide" style="width:100%">
    <div class="choice-prompt" style="margin-bottom:6px">Watch what happens when each neuron dies.</div>
    <div style="font-size:14px;color:var(--text2);text-align:center;margin-bottom:16px">Tap each stage to reveal it. Open all four to continue.</div>
    <div class="vacc-wrap">${items}</div>
    <div id="nb-fb" style="display:none;margin-top:12px"></div>
  </div>`;
}
function toggleNB(i){
  const body=document.getElementById('nbb'+i);
  const trig=document.getElementById('nbt'+i);
  const arr=document.getElementById('nba'+i);
  const num=document.getElementById('nbn'+i);
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open');
  trig.classList.toggle('opened',!isOpen);
  arr.textContent=isOpen?'▼':'▲';
  if(!isOpen){
    window._nbOpened.add(i);
    num.classList.add('done');
    num.textContent='✓';
    if(window._nbOpened.size>=window._nbSteps.length){
      stepDone=true;
      const btn=document.getElementById('main-btn');
      btn.textContent='Got it →'; btn.className='main-btn btn-go';
      const fb=document.getElementById('nb-fb');
      fb.className='reveal-result good';
      fb.innerHTML='<div class="reveal-emoji">✅</div><div class="reveal-verdict" style="color:var(--green)">You\'ve seen all four stages — the ALS paradox makes sense now.</div>';
      fb.style.display='block';
    }
  }
}

function toggleReveal(i){
  const body=document.getElementById('rvb'+i);
  const trig=document.getElementById('rvt'+i);
  const arr=document.getElementById('rva'+i);
  const ico=document.getElementById('rvi'+i);
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open');
  trig.classList.toggle('opened',!isOpen);
  arr.textContent=isOpen?'▼':'▲';
  if(!isOpen){
    _revOpened.add(i);
    ico.classList.add('done');
    ico.textContent='✓';
  }
  checkRevealDone();
}
function checkRevealDone(){
  const step=curChapter.steps[curStep];
  const total=step.items.length;
  const btn=document.getElementById('main-btn');
  if(_revOpened.size>=total){
    btn.textContent='Continue →'; btn.className='main-btn btn-go'; stepDone=true;
    const fb=document.getElementById('rs-fb');
    if(fb){fb.className='reveal-result good';fb.innerHTML='<div class="reveal-emoji">✅</div><div class="reveal-verdict" style="color:var(--green)">All revealed. Keep going!</div>';fb.style.display='block';}
  } else {
    const rem=total-_revOpened.size;
    btn.textContent=`Open ${rem} more to continue`; btn.className='main-btn btn-check'; stepDone=false;
  }
}

function handleBtn(){
  // On map screen — button starts active chapter directly
  if(!curChapter){
    openActiveCase();
    return;
  }

  const step=curChapter.steps[curStep];
  if(step.type==='badge'){showMap();return;}

  if(!stepDone){
    if(step.type==='choice'||step.type==='diagnosis-commit') checkChoice();
    else if(step.type==='tap') checkTap();
    return;
  }

  // advance to next step
  curStep++;
  if(curStep>=curChapter.steps.length){completeChapter();showMap();}
  else{stepDone=false;_selectedChoice=-1;_tapped=new Set();_matchSel=null;_matchDone=new Set();renderStep();}
}

function completeChapter(){
  if(!done.includes(curChapter.id)){
    done.push(curChapter.id);
    XP+=curChapter.xp;
    save();
  }
}

function goBack(){
  if(!document.getElementById('lesson-screen').classList.contains('hidden')){
    curChapter=null;
    showMap();
  }
}

    if(inner){ inner.classList.add('combo-fade'); }

// ── XP FLOAT ──
function floatXP(amount){
  const barEl = document.getElementById('bar-xp');
  const rect = barEl ? barEl.getBoundingClientRect() : null;
  const el = document.createElement('div');
  el.className = 'xp-float';
  el.textContent = '+' + amount + ' XP';
  el.style.left = rect ? (rect.left + rect.width/2 - 28) + 'px' : 'calc(50% - 28px)';
  el.style.top  = rect ? (rect.top - 4) + 'px' : '30%';
  document.body.appendChild(el);
  el.addEventListener('animationend', ()=>el.remove());
  // pulse the bar
  barEl && barEl.classList.add('bar-pulse');
  setTimeout(()=>barEl && barEl.classList.remove('bar-pulse'), 500);
}

// ── CONFETTI ──
function launchConfetti(ms=2800){
  const canvas = document.getElementById('confetti-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.display = 'block';

  const colors = ['#7c6df0','#b8aff8','#3dd68c','#f5a623','#5ba4f5','#f06b6b','#ff79c6','#fcd34d'];
  const pieces = Array.from({length:130}, ()=>({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height - canvas.height,
    w: 7+Math.random()*7,
    h: 3.5+Math.random()*3.5,
    color: colors[Math.floor(Math.random()*colors.length)],
    vx: (Math.random()-.5)*5,
    vy: 2.5+Math.random()*4,
    rot: Math.random()*360,
    vr: (Math.random()-.5)*9,
  }));

  const start = Date.now();
  (function frame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const t = (Date.now()-start)/ms;
    pieces.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
      ctx.save();
      ctx.globalAlpha = Math.max(0, 1-t*1.1);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if(Date.now()-start < ms) requestAnimationFrame(frame);
    else{ ctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display='none'; }
  })();
}

//  B — GLOSSARY
// ══════════════════════════════════════════════════
const GLOSSARY = {
  'UMN':  '<strong>Upper Motor Neuron</strong> — the brain\'s command wire. Starts in the motor cortex, runs down to the spinal cord. Controls the lower motor neuron. When it dies: reflexes go brisk, spasticity, Babinski sign.',
  'LMN':  '<strong>Lower Motor Neuron</strong> — the spinal cord wire to the muscle. When it dies: the muscle loses its signal → wasting, fasciculations, floppy tone, lost reflexes.',
  'FVC':  '<strong>Forced Vital Capacity</strong> — a lung function test. Measures how much air you can breathe out forcefully. In ALS: <50% means the diaphragm is failing → start NIV (BiPAP) immediately.',
  'NIV':  '<strong>Non-Invasive Ventilation</strong> — breathing support through a mask (usually BiPAP). No intubation. Used overnight in ALS when the diaphragm can\'t ventilate during sleep. Adds 7–13 months of survival.',
  'BiPAP':'<strong>Bilevel Positive Airway Pressure</strong> — a form of NIV. Delivers pressurised air through a face mask; one pressure for breathing in, one for out. First-line respiratory support in ALS.',
  'EMG':  '<strong>Electromyography</strong> — records electrical activity in muscles using fine needles. In ALS: shows active denervation (fibrillations, positive sharp waves) across multiple regions. The cornerstone diagnostic test.',
  'NMJ':  '<strong>Neuromuscular Junction</strong> — the synapse where the nerve meets the muscle. Acetylcholine is released here. In ALS the NMJ degenerates as the LMN dies. In Myasthenia Gravis, antibodies attack it directly.',
  'SOD1': '<strong>Superoxide Dismutase 1</strong> — a gene mutated in ~20% of familial ALS. Produces misfolded toxic protein. Target of tofersen (an antisense oligonucleotide drug that silences the gene).',
  'TDP-43':'<strong>TDP-43</strong> — a nuclear RNA-binding protein. In 97% of ALS, it escapes the nucleus, clumps up in the cytoplasm, and destroys the neuron\'s RNA machinery. The molecular fingerprint of ALS.',
  'C9orf72':'<strong>C9orf72</strong> — the most common genetic cause of both ALS and frontotemporal dementia (FTD). A repeat expansion in chromosome 9. Accounts for ~40% of familial ALS.',
  'ASO':  '<strong>Antisense Oligonucleotide</strong> — a short piece of engineered DNA that binds to a specific mRNA and silences it. Tofersen uses this mechanism to reduce toxic SOD1 protein.',
  'NfL':  '<strong>Neurofilament Light chain</strong> — a protein released into blood and CSF when neurons are stressed or dying. Can detect neuronal damage years before symptoms appear. Used as a biomarker in ALS trials.',
  'PEG':  '<strong>Percutaneous Endoscopic Gastrostomy</strong> — a feeding tube placed through the abdominal wall into the stomach. Must be inserted BEFORE FVC drops below 50% — anaesthetic risk rises sharply below that threshold.',
  'MDT':  '<strong>Multidisciplinary Team</strong> — in ALS: neurologist, respiratory physician, SLT (speech), dietitian, physiotherapist, OT, psychologist, palliative care. MDT care independently extends survival.',
  'SLT':  '<strong>Speech and Language Therapist</strong> — manages communication and swallowing in ALS. Recommends voice banking, AAC devices, and dietary modifications for dysphagia.',
  'AAC':  '<strong>Augmentative and Alternative Communication</strong> — devices that allow non-verbal communication. Ranges from letter boards to eye-tracking technology (e.g. Tobii). Critical when speech fails.',
  'MRC':  '<strong>Medical Research Council scale</strong> — grades muscle strength 0–5. 0 = no movement, 5 = full power against resistance. Standard tool for documenting motor decline in ALS.',
  'AMPA': '<strong>AMPA receptor</strong> — a glutamate receptor on neurons. Motor neurons have abnormally low GluR2 subunits → the channel is calcium-permeable → floods of Ca²⁺ enter with every signal (excitotoxicity).',
  'MMN':  '<strong>Multifocal Motor Neuropathy</strong> — a treatable mimic of ALS. LMN signs only, no UMN signs, GM1 antibodies positive. Responds to IVIG. Missing it means a patient gets an ALS label instead of a cure.',
  'El Escorial':'<strong>El Escorial criteria</strong> — the international diagnostic framework for ALS. Counts how many of 4 body regions (Bulbar, Cervical, Thoracic, Lumbosacral) show both UMN and LMN signs. 3+ = Definite ALS.',
  'CO₂':  '<strong>Carbon dioxide</strong> — the waste gas from metabolism. In ALS: a weakened diaphragm can\'t clear CO₂ during sleep → it builds up overnight → CO₂ causes cerebral vasodilation → morning headache on waking.',
  'ATLAS':'<strong>ATLAS trial</strong> — a landmark clinical trial giving tofersen to pre-symptomatic SOD1 mutation carriers. Goal: prevent ALS from ever starting. Uses NfL as a biomarker to detect presymptomatic neuronal stress.',
};

function glossify(html){
  if(!html) return html;
  // Sort longest terms first to avoid partial matches
  const terms = Object.keys(GLOSSARY).sort((a,b) => b.length - a.length);
  terms.forEach(term => {
    const safe = term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    // Only match whole words/phrases, not inside HTML tags or existing gloss spans
    const re = new RegExp(`(?<!<[^>]*)\\b(${safe})\\b(?![^<]*>)(?![^<]*class="gloss-term")`, 'g');
    html = html.replace(re, (match) =>
      `<span class="gloss-term" onclick="showGloss('${term.replace(/'/g,"\\'")}')">${match}</span>`
    );
  });
  return html;
}

function showGloss(term){
  document.getElementById('gloss-term-name').textContent = term;
  document.getElementById('gloss-body').innerHTML = GLOSSARY[term] || term;
  document.getElementById('gloss-sheet').classList.add('show');
  document.getElementById('gloss-overlay').classList.add('show');
}
function hideGloss(){
  document.getElementById('gloss-sheet').classList.remove('show');
  document.getElementById('gloss-overlay').classList.remove('show');
}

// Wrap the original checkChoice to add gamification
const _origCheckChoice = checkChoice;
checkChoice = function(){
  const step = curChapter.steps[curStep];
  if(_selectedChoice < 0) return;
  const correct = step.choices[_selectedChoice].correct;
  _origCheckChoice();
  triggerCombo(correct);
  if(correct){
    const xpGain = 15;
    floatXP(xpGain);
    if(tc===1) checkAchievement('first_correct');
  }
};

const _origCheckTap = checkTap;
checkTap = function(){
  // snapshot state before original runs
  const prevCorrect = lvlCorrect;
  _origCheckTap();
  const gotIt = lvlCorrect > prevCorrect;
  triggerCombo(gotIt);
  if(gotIt){
    floatXP(15);
    if(tc===1) checkAchievement('first_correct');
  }
};

const _origCompleteChapter = completeChapter;
completeChapter = function(){
  const wasNew = !done.includes(curChapter.id);
  const wasPerfect = (lvlCorrect === lvlTotal && lvlTotal > 0);
  _origCompleteChapter();
  if(wasNew){
    // small delay so map has time to render, then celebrate
    setTimeout(()=>{
      launchConfetti(3000);
      checkLevelUp();
      const doneCount = done.length;
      if(doneCount===1) checkAchievement('first_chapter');
      if(wasPerfect)    checkAchievement('perfect');
      if(doneCount===3) checkAchievement('half_done');
      if(doneCount===6) checkAchievement('all_done');
    }, 400);
  }
};
